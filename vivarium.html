<style>

<script>
(function(){
const STORAGE_KEY = 'mochigo_sync_' + SONG_ID;
const audio = document.getElementById('audio');
let activeIdx = -1;

// Section offsets — saved per song
let sectionOffsets = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved) sectionOffsets = JSON.parse(saved);
} catch(e){}

function saveOffsets(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sectionOffsets)); }catch(e){} }

function getAdjustedTime(line){
  const sec = line.section;
  const off = sectionOffsets[sec] || 0;
  return line.t + off;
}

// Build lyrics DOM
const container = document.getElementById('lyricsContainer');
let currentSection = null;
let sectionEl = null;

LYRICS.forEach((line, i) => {
  // Section header
  if(line.section !== currentSection){
    currentSection = line.section;
    sectionEl = document.createElement('div');
    sectionEl.className = 'section-label';
    sectionEl.dataset.section = line.section;
    const off = sectionOffsets[line.section] || 0;
    sectionEl.innerHTML = `
      <span>${line.section}</span>
      <div class="section-adj">
        <button class="btn-sadj" data-sec="${line.section}" data-d="-1">-1s</button>
        <span class="sadj-val" id="sadj-${line.section}">${off >= 0 ? '+' : ''}${off}s</span>
        <button class="btn-sadj" data-sec="${line.section}" data-d="1">+1s</button>
      </div>
    `;
    container.appendChild(sectionEl);
  }

  if(!line.es && !line.ro && !line.kj) return;

  const block = document.createElement('div');
  block.className = 'lyric-block';
  block.dataset.idx = i;
  let inner = '';
  if(line.es) inner += `<div class="lyric-es">${line.es}</div>`;
  if(line.ro) inner += `<div class="lyric-romaji">${line.ro}</div>`;
  if(line.kj) inner += `<div class="lyric-kanji">${line.kj}</div>`;
  block.innerHTML = inner;
  block.addEventListener('click', () => { audio.currentTime = getAdjustedTime(line); });
  container.appendChild(block);
});

// Section adjust buttons
document.querySelectorAll('.btn-sadj').forEach(btn => {
  btn.addEventListener('click', () => {
    const sec = btn.dataset.sec;
    const d = parseInt(btn.dataset.d);
    sectionOffsets[sec] = (sectionOffsets[sec] || 0) + d;
    saveOffsets();
    const valEl = document.getElementById('sadj-' + sec);
    if(valEl){ const v = sectionOffsets[sec]; valEl.textContent = (v>=0?'+':'') + v + 's'; }
    updateActive(audio.currentTime);
  });
});

const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

function updateActive(t){
  document.getElementById('progressFill').style.width = (audio.duration?(t/audio.duration*100):0)+'%';
  document.getElementById('timeNow').textContent = fmt(t);

  // Find active line using adjusted times
  let newActive = -1;
  const blocks = document.querySelectorAll('.lyric-block');
  let blockIdx = 0;
  for(let i = 0; i < LYRICS.length; i++){
    if(!LYRICS[i].es && !LYRICS[i].ro && !LYRICS[i].kj) continue;
    if(t >= getAdjustedTime(LYRICS[i])) newActive = blockIdx;
    blockIdx++;
  }

  if(newActive !== activeIdx){
    activeIdx = newActive;
    blocks.forEach((b, i) => {
      b.classList.toggle('active', i === activeIdx);
      b.classList.toggle('past', i < activeIdx);
    });
    if(activeIdx >= 0 && blocks[activeIdx]){
      blocks[activeIdx].scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
}

audio.addEventListener('loadedmetadata', () => { document.getElementById('timeTotal').textContent = fmt(audio.duration); });
audio.addEventListener('error', () => { document.getElementById('audioError').classList.add('show'); });
audio.addEventListener('timeupdate', () => { updateActive(audio.currentTime); });
audio.addEventListener('ended', () => {
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.getElementById('playBtn').textContent = '▶ Play';
});

document.getElementById('progressBar').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * (audio.duration || 0);
});

const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', () => {
  if(audio.paused){
    audio.play(); playBtn.textContent = '⏸ Pausa';
    document.body.classList.add('is-playing');
    document.getElementById('visualizer').classList.add('playing');
  } else {
    audio.pause(); playBtn.textContent = '▶ Play';
    document.body.classList.remove('is-playing');
    document.getElementById('visualizer').classList.remove('playing');
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  audio.pause(); audio.currentTime = 0; activeIdx = -1;
  playBtn.textContent = '▶ Play';
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.querySelectorAll('.lyric-block').forEach(b => b.classList.remove('active','past'));
  window.scrollTo({top:0, behavior:'smooth'});
});

document.getElementById('vol').addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });
audio.volume = 0.8;

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    document.body.className = document.body.className.replace(/\bview-\S+/g,'').trim();
    if(v !== 'all') document.body.classList.add('view-' + v);
    if(!audio.paused) document.body.classList.add('is-playing');
  });
});

// Visualizer
const vizEl = document.getElementById('visualizer');
for(let i = 0; i < 48; i++){
  const bar = document.createElement('div');
  bar.className = 'bar';
  const maxH = 8 + Math.sin(i*0.4)*22 + Math.random()*16;
  bar.style.cssText = `--max-h:${maxH}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;
  vizEl.appendChild(bar);
}
})();
</script>
</body>
</html>
