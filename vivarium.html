<html lang="es">
<head>
<meta charset="UTF-8">

<title>ビバリウム · Vivarium — Musci</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#09070f;--card:#1a1230;--accent1:#c084fc;--accent2:#f472b6;--accent3:#818cf8;--text:#f1e9ff;--muted:#6b5e8c;--glow:rgba(192,132,252,0.3)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:160px}

  .back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(26,18,48,0.8);border:1px solid rgba(192,132,252,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
  header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(192,132,252,0.15)}

  .artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
  .visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
  .bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent2),var(--accent1));opacity:0.4;height:4px}
  @keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
  .playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
  audio{display:none}
  .progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
  .progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
  .time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
  .controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
  .btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
  .btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
  .btn-primary:hover{transform:scale(1.05)}
  .btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(192,132,252,0.3);padding:0.75rem 1.3rem;font-size:0.9rem}
  .volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
  .volume-row span{color:var(--muted);font-size:0.8rem}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
  .sync-bar{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.3rem 2rem 0.8rem;flex-wrap:wrap}
  .sync-label{font-size:0.72rem;color:var(--muted);letter-spacing:0.1em}
  .btn-sync{background:var(--card);border:1px solid rgba(192,132,252,0.25);color:var(--accent1);padding:0.3rem 0.8rem;border-radius:999px;font-size:0.85rem;cursor:pointer}
  .sync-val{font-size:0.82rem;color:var(--accent1);font-family:'Cormorant Garamond',serif;min-width:40px;text-align:center}
  .view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
  .toggle-btn{border:1px solid rgba(192,132,252,0.25);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
  .toggle-btn.active{background:rgba(192,132,252,0.12);border-color:var(--accent1);color:var(--accent1)}
  .lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
  .section-label{text-align:center;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;opacity:0.5;display:flex;align-items:center;gap:0.8rem}
  .section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(192,132,252,0.15)}
  .section-adj{display:flex;align-items:center;gap:0.3rem;margin-left:0.5rem}
  .btn-sadj{background:rgba(192,132,252,0.08);border:1px solid rgba(192,132,252,0.2);color:var(--accent1);padding:0.15rem 0.5rem;border-radius:999px;font-size:0.7rem;cursor:pointer}
  .sadj-val{font-size:0.7rem;color:var(--muted);min-width:28px;text-align:center}
  .lyric-block{padding:1.2rem 1.6rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.3}
  .lyric-block.past{opacity:0.18}
  .lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(192,132,252,0.08),rgba(244,114,182,0.06));border-color:rgba(192,132,252,0.3);box-shadow:0 0 30px rgba(192,132,252,0.1);transform:translateX(6px)}
  .lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.35rem}
  .lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.88rem,2vw,1.05rem);color:var(--accent1);opacity:0.85;margin-bottom:0.25rem}
  .lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.75rem,1.5vw,0.88rem);color:var(--muted);font-weight:300;letter-spacing:0.08em}
  body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
  body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
  body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
  .audio-error{display:none;position:relative;z-index:1;margin:0.5rem 2rem;padding:0.8rem 1.2rem;background:rgba(244,114,182,0.12);border:1px solid rgba(244,114,182,0.3);border-radius:12px;color:var(--accent2);font-size:0.82rem;text-align:center}
  .audio-error.show{display:block}

  /* ── BARRA FIJA ABAJO ── */
  .karaoke-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:linear-gradient(to top,rgba(9,7,15,0.97),rgba(26,18,48,0.95));
    border-top:1px solid rgba(192,132,252,0.25);
    backdrop-filter:blur(16px);
    padding:0.8rem 1.5rem 1rem;
    min-height:90px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0.3rem;
    text-align:center;
  }
  .karaoke-bar-es{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1.1rem,4vw,1.6rem);
    font-weight:600;
    background:linear-gradient(90deg,var(--text),var(--accent1));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;
    transition:opacity 0.3s;
  }
  .karaoke-bar-ro{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(0.78rem,2.5vw,0.95rem);
    color:var(--accent1);
    opacity:0.75;
    transition:opacity 0.3s;
  }
  .karaoke-bar-kj{
    font-family:'Noto Serif JP',serif;
    font-size:clamp(0.68rem,2vw,0.82rem);
    color:var(--muted);
    font-weight:300;
    letter-spacing:0.1em;
    transition:opacity 0.3s;
  }
  .karaoke-bar-idle{
    color:var(--muted);font-size:0.8rem;letter-spacing:0.2em;opacity:0.4;
  }
  @keyframes bar-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .karaoke-bar-es,.karaoke-bar-ro,.karaoke-bar-kj{animation:bar-in 0.25s ease}
  body.view-es .karaoke-bar-ro,body.view-es .karaoke-bar-kj{display:none}
  body.view-romaji .karaoke-bar-es,body.view-romaji .karaoke-bar-kj{display:none}
  body.view-kanji .karaoke-bar-es,body.view-kanji .karaoke-bar-ro{display:none}

  /* ── BOTÓN VIDEO ── */
  .btn-video{position:fixed;top:1rem;right:1rem;z-index:100;background:rgba(26,18,48,0.85);border:1px solid rgba(192,132,252,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;font-size:0.8rem;backdrop-filter:blur(8px);cursor:pointer;transition:all 0.2s;font-family:'Noto Serif JP',serif}
  .btn-video:hover{background:rgba(192,132,252,0.15)}
  .video-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(9,7,15,0.96);flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1.5rem}
  .video-modal.open{display:flex}
  .video-modal-close{align-self:flex-end;background:transparent;border:1px solid rgba(192,132,252,0.3);color:var(--accent1);padding:0.4rem 1rem;border-radius:999px;cursor:pointer;font-size:0.85rem;font-family:'Noto Serif JP',serif}
  .video-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--muted);letter-spacing:0.2em}
  .video-wrap{width:100%;max-width:600px;aspect-ratio:16/9;border-radius:16px;overflow:hidden;border:1px solid rgba(192,132,252,0.2);background:var(--card);display:flex;align-items:center;justify-content:center}
  .video-wrap iframe{width:100%;height:100%;border:none}
  .video-en-proceso{color:var(--muted);font-size:0.85rem;letter-spacing:0.2em;text-align:center;padding:2rem;opacity:0.6}
</style>
</head>

  {t:239.77,section:"Coro Final",es:"La luz que titila en mis ojos es el futuro que pinté",ro:"Kono me de yureta hikari wa ano hi egaku mirai da",kj:"この目で揺れた光はあの日描く未来だ"},
  {t:241.1,section:"Outro",es:"",ro:"",kj:""},
  {t:241.1,section:"Outro",es:"Adiós, porque aún tengo que seguir cantando",ro:"Sayonara mada watashi wa utawanakunacha",kj:"さようならまだ私は歌わなくちゃ"},
  {t:242.17,section:"Outro",es:"No estás sola hasta que el alba finalmente llegue",ro:"Yoru ga akeru made hitori ja nai kara",kj:"夜が明けるまで一人じゃないから"},
  {t:243.32,section:"Outro",es:"Porque tú, escondida en el clóset, aún sigue llorando",ro:"Kuroozetto no kimi wa mada naite iru",kj:"クローゼットの君はまだ泣いてる"},

<script>
(function(){
const STORAGE_KEY = 'musci_sync_vivarium';
const audio = document.getElementById('audio');
let activeIdx = -1;
let sectionOffsets = {};
try { const s = localStorage.getItem(STORAGE_KEY); if(s) sectionOffsets = JSON.parse(s); } catch(e){}
function saveOffsets(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sectionOffsets)); }catch(e){} }
function adjTime(line){ return line.t + (sectionOffsets[line.section]||0); }

// Build lyrics
const container = document.getElementById('lyricsContainer');
let curSection = null;
LYRICS.forEach((line,i)=>{
  if(line.section !== curSection){
    curSection = line.section;
    const sl = document.createElement('div');
    sl.className='section-label';
    sl.dataset.section=line.section;
    const off=sectionOffsets[line.section]||0;
    sl.innerHTML=`<span>${line.section}</span><div class="section-adj"><button class="btn-sadj" data-sec="${line.section}" data-d="-1">-1s</button><span class="sadj-val" id="sadj-${line.section}">${off>=0?'+':''}${off}s</span><button class="btn-sadj" data-sec="${line.section}" data-d="1">+1s</button></div>`;
    container.appendChild(sl);
  }
  if(!line.es && !line.ro && !line.kj) return;
  const b=document.createElement('div');
  b.className='lyric-block';b.dataset.idx=i;
  let h='';
  if(line.es) h+=`<div class="lyric-es">${line.es}</div>`;
  if(line.ro) h+=`<div class="lyric-romaji">${line.ro}</div>`;
  if(line.kj) h+=`<div class="lyric-kanji">${line.kj}</div>`;
  b.innerHTML=h;
  b.addEventListener('click',()=>{ audio.currentTime=adjTime(line); });
  container.appendChild(b);
});

// Section adjust
document.querySelectorAll('.btn-sadj').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const sec=btn.dataset.sec, d=parseInt(btn.dataset.d);
    sectionOffsets[sec]=(sectionOffsets[sec]||0)+d;
    saveOffsets();
    const el=document.getElementById('sadj-'+sec);
    if(el){ const v=sectionOffsets[sec]; el.textContent=(v>=0?'+':'')+v+'s'; }
    updateActive(audio.currentTime);
  });
});

const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

// Karaoke bar elements
const barEs=document.getElementById('kbarEs');
const barRo=document.getElementById('kbarRo');
const barKj=document.getElementById('kbarKj');
const barIdle=document.getElementById('kbarIdle');

let lastBarIdx=-1;
function updateBar(idx){
  if(idx===lastBarIdx) return;
  lastBarIdx=idx;
  const contentLines=LYRICS.filter(l=>l.es||l.ro||l.kj);
  if(idx<0||idx>=contentLines.length){
    barEs.textContent=''; barRo.textContent=''; barKj.textContent='';
    barIdle.style.display='block';
    return;
  }
  barIdle.style.display='none';
  const line=contentLines[idx];
  // Force re-animation
  [barEs,barRo,barKj].forEach(el=>{ el.style.animation='none'; el.offsetHeight; el.style.animation=''; });
  barEs.textContent=line.es||'';
  barRo.textContent=line.ro||'';
  barKj.textContent=line.kj||'';
}

function updateActive(t){
  document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
  document.getElementById('timeNow').textContent=fmt(t);
  const blocks=document.querySelectorAll('.lyric-block');
  let newActive=-1, blockIdx=0;
  for(let i=0;i<LYRICS.length;i++){
    if(!LYRICS[i].es&&!LYRICS[i].ro&&!LYRICS[i].kj) continue;
    if(t>=adjTime(LYRICS[i])) newActive=blockIdx;
    blockIdx++;
  }
  if(newActive!==activeIdx){
    activeIdx=newActive;
    blocks.forEach((b,i)=>{ b.classList.toggle('active',i===activeIdx); b.classList.toggle('past',i<activeIdx); });
    if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
  }
  updateBar(activeIdx);
}

audio.addEventListener('loadedmetadata',()=>{ document.getElementById('timeTotal').textContent=fmt(audio.duration); });
audio.addEventListener('error',()=>{ document.getElementById('audioError').classList.add('show'); });
audio.addEventListener('timeupdate',()=>{ updateActive(audio.currentTime); });
audio.addEventListener('ended',()=>{
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.getElementById('playBtn').textContent='▶ Play';
});

document.getElementById('progressBar').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);
});

const playBtn=document.getElementById('playBtn');
playBtn.addEventListener('click',()=>{
  if(audio.paused){ audio.play(); playBtn.textContent='⏸ Pausa'; document.body.classList.add('is-playing'); document.getElementById('visualizer').classList.add('playing'); }
  else { audio.pause(); playBtn.textContent='▶ Play'; document.body.classList.remove('is-playing'); document.getElementById('visualizer').classList.remove('playing'); }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  audio.pause(); audio.currentTime=0; activeIdx=-1; lastBarIdx=-1;
  playBtn.textContent='▶ Play';
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.querySelectorAll('.lyric-block').forEach(b=>b.classList.remove('active','past'));
  barEs.textContent=''; barRo.textContent=''; barKj.textContent='';
  barIdle.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('vol').addEventListener('input',e=>{ audio.volume=parseFloat(e.target.value); });
audio.volume=0.8;

document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v=btn.dataset.view;
    document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
    if(v!=='all') document.body.classList.add('view-'+v);
    if(!audio.paused) document.body.classList.add('is-playing');
  });
});

const vizEl=document.getElementById('visualizer');
for(let i=0;i<48;i++){
  const bar=document.createElement('div'); bar.className='bar';
  const mh=8+Math.sin(i*0.4)*22+Math.random()*16;
  bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;
  vizEl.appendChild(bar);
}
})();
</script>
