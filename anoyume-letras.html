<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あの夢をなぞって · Ano Yume wo Nazotte — Música</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#050500;--card:#0a0900;--accent1:#c8940a;--accent2:#e8d080;--accent3:#3a2a00;--text:#fff8e8;--muted:#5a4e10;--glow:rgba(200,148,10,0.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(180,120,0,0.10) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(0,180,180,0.06) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(5,5,0,0.85);border:1px solid rgba(200,148,10,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(200,148,10,0.15)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2),#f07090);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.4;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(200,148,10,0.3);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(200,148,10,0.25);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(200,148,10,0.12);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;opacity:0.5;display:flex;align-items:center;gap:0.8rem}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(200,148,10,0.15)}
.lyric-block{padding:1.2rem 1.6rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.3}
.lyric-block.past{opacity:0.18}
.lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(100,70,0,0.12),rgba(200,148,10,0.07));border-color:rgba(200,148,10,0.35);box-shadow:0 0 30px rgba(180,120,0,0.15);transform:translateX(6px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.35rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.5vw,1.25rem);color:var(--accent2);margin-bottom:0.3rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.95rem,2vw,1.1rem);color:var(--accent2);opacity:0.75;font-weight:400;letter-spacing:0.08em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;opacity:0.5}
.scroll-btn:hover{transform:scale(1.1);opacity:1}
.scroll-btn.active{opacity:1}
</style>
</head>
<body>
<a class="back-btn" href="anoyume.html">← Volver</a>
<audio id="audio" src="A-m.mp3" preload="auto"></audio>
<header>
  <div class="song-title">あの夢をなぞって · Ano Yume wo Nazotte</div>
  <div class="artist-name">YOASOBI · 2020</div>
  <div class="visualizer-wrap" id="visualizer"></div>
</header>
<div class="progress-section">
  <div class="progress-bar-wrap" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="time-row"><span id="timeNow">0:00</span><span id="timeTotal">—</span></div>
</div>
<div class="controls">
  <button class="btn btn-primary" id="playBtn">▶ Play</button>
  <button class="btn btn-secondary" id="resetBtn">↩ Reinicio</button>
</div>
<div class="volume-row">
  <span>🔈</span><input type="range" id="vol" min="0" max="1" step="0.05" value="0.8"><span>🔊</span>
</div>
<div class="view-toggles">
  <button class="toggle-btn active" data-view="all">Todo</button>
  <button class="toggle-btn" data-view="es">Español</button>
  <button class="toggle-btn" data-view="romaji">Romaji</button>
  <button class="toggle-btn" data-view="kanji">日本語</button>
</div>
<div class="lyrics-container" id="lyricsContainer"></div>
<button class="scroll-btn" id="scrollBtn" title="Ir a letra actual">♪</button>

<script>
const LYRICS = [
  {t:0.24,  section:"Intro",    es:"Las flores hermosas que adornan el cielo nocturno", ro:"Yoru no sora wo kazaru kirei na hana", kj:"夜の空を飾る綺麗な花"},
  {t:5.24,  section:"Intro",    es:"La luz que abraza con fuerza las voces de la ciudad", ro:"Machi no koe wo gyutto hikari ga tsutsumi komu", kj:"街の声をぎゅっと光が包み込む"},
  {t:11.24, section:"Intro",    es:"En un mundo solo para los dos, sin sonido, se escucharon esas palabras:", ro:"Oto no nai futari dake no sekai de kikoeta kotoba wa", kj:"音の無い二人だけの世界で聞こえた言葉は"},
  {t:18.49, section:"Intro",    es:"«Te quiero»", ro:"'Suki da yo'", kj:"「好きだよ」"},
  {t:35.24, section:"Verso 1",  es:"El futuro que vi en mis sueños", ro:"Yume no naka de mieta mirai no koto", kj:"夢の中で見えた未来のこと"},
  {t:39.99, section:"Verso 1",  es:"Noche de verano contigo, dos sombras juntas", ro:"Natsu no yoru kimi to, narabu kage ga futatsu", kj:"夏の夜、君と、並ぶ影が二つ"},
  {t:45.74, section:"Verso 1",  es:"Si los últimos fuegos artificiales suben al cielo y desaparecen", ro:"Saigo no hanabi ga sora ni nobotte kietara", kj:"最後の花火が空に昇って消えたら"},
  {t:52.24, section:"Verso 1",  es:"Con esa señal…", ro:"Sore wo aizu ni", kj:"それを合図に"},
  {t:55.75, section:"Verso 1",  es:"En la mañana de siempre", ro:"Itsumo toori no asa ni", kj:"いつも通りの朝に"},
  {t:58.49, section:"Verso 1",  es:"Con tu figura de siempre", ro:"Itsumo toori no kimi no sugata", kj:"いつも通りの君の姿"},
  {t:1*60+1.24, section:"Verso 1", es:"Sin querer aparté la mirada", ro:"Omowazu me wo sorashite shimatta no wa", kj:"思わず目を逸らしてしまったのは"},
  {t:1*60+6.49, section:"Verso 1", es:"Tus palabras que no puedo olvidar sin importar cómo lo intente", ro:"Dou yatta tte wasurerarenai kimi no kotoba", kj:"どうやったって忘れられない君の言葉"},
  {t:1*60+13.24, section:"Verso 1", es:"Siguen resonando en mí hasta hoy", ro:"Ima mo zutto hibiiteru kara", kj:"今もずっと響いてるから"},
  {t:1*60+17.81, section:"Coro 1",  es:"Atravesando la noche, hacia el más allá de los sueños", ro:"Yoru wo nukete yume no saki e", kj:"夜を抜けて夢の先へ"},
  {t:1*60+24.02, section:"Coro 1",  es:"Hacia el futuro al que quiero llegar", ro:"Tadori tsukitai mirai e", kj:"辿り着きたい未来へ"},
  {t:1*60+28.69, section:"Coro 1",  es:"¿De verdad? ¿A ese sueño, de verdad? — aún me pregunto", ro:"Hontou ni? Ano yume ni, hontou ni? tte ima mo", kj:"本当に？あの夢に、本当に？って今も"},
  {t:1*60+33.37, section:"Coro 1",  es:"Me pongo ansioso, pero seguramente…", ro:"Fuan ni natte shimau kedo kitto", kj:"不安になってしまうけどきっと"},
  {t:1*60+40.25, section:"Coro 1",  es:"Atravesando el presente, hacia el más allá del mañana", ro:"Ima wo nukete asu no saki e", kj:"今を抜けて明日の先へ"},
  {t:1*60+45.54, section:"Coro 1",  es:"Al lugar solo para los dos", ro:"Futari dake no basho e", kj:"二人だけの場所へ"},
  {t:1*60+50.11, section:"Coro 1",  es:"Solo un poco más — por favor, no cambies", ro:"Mou chotto, douka kawaranaide", kj:"もうちょっと、どうか変わらないで"},
  {t:1*60+53.88, section:"Coro 1",  es:"Solo un poco más — esas palabras tuyas", ro:"Mou chotto, kimi kara no kotoba", kj:"もうちょっと、君からの言葉"},
  {t:1*60+55.16, section:"Coro 1",  es:"En ese futuro, te espero", ro:"Ano mirai de matte iru yo", kj:"あの未来で待っているよ"},
  {t:2*60+15.38, section:"Verso 2", es:"Una noche que nadie conoce — solo de los dos", ro:"Daremo shiranai, futari dake no yoru", kj:"誰も知らない、二人だけの夜"},
  {t:2*60+20.98, section:"Verso 2", es:"Se superpone al paisaje que tanto anhelábamos ver", ro:"Machikogareteita keshiki to kasanaru", kj:"待ち焦がれていた景色と重なる"},
  {t:2*60+26.62, section:"Verso 2", es:"Los fuegos artificiales que florecen uniendo el futuro y el presente en el cielo de verano", ro:"Natsu no sora ni mirai to ima tsunagaru you ni hiraku hanabi", kj:"夏の空に未来と今繋がる様に開く花火"},
  {t:2*60+31.96, section:"Verso 2", es:"Contigo aquí — trazamos ese sueño", ro:"Kimi to koko de hora ano yume wo nazoru", kj:"君とここでほらあの夢をなぞる"},
  {t:2*60+36.97, section:"Verso 2", es:"La luz que adorna el cielo que alcé a ver ilumina ahora tu perfil", ro:"Miageta sora wo kazaru hikari ga ima terashita yokogao", kj:"見上げた空を飾る光が今照らした横顔"},
  {t:2*60+48.51, section:"Puente",  es:"Sí — todo esto fue por este paisaje", ro:"Sou zutto kono keshiki no tame ni", kj:"そうずっとこの景色のために"},
  {t:2*60+51.70, section:"Puente",  es:"Sí — de seguro dos futuros se superponen ahora mismo", ro:"Sou kitto hora futatsu no mirai ga ima kasanariau", kj:"そうきっとほら二つの未来が今重なりあう"},
  {t:3*60+2.20,  section:"Coro 2",  es:"En la noche, contigo, los dos", ro:"Yoru no naka de kimi to futari", kj:"夜の中で君と二人"},
  {t:3*60+8.64,  section:"Coro 2",  es:"En el futuro al que llegamos", ro:"Tadori tsuita mirai de", kj:"辿り着いた未来で"},
  {t:3*60+12.91, section:"Coro 2",  es:"Está bien — mis sentimientos llegarán, seguro que llegarán", ro:"Daijoubu omoi wa kitto daijoubu tsutawaru", kj:"大丈夫想いはきっと大丈夫伝わる"},
  {t:3*60+17.67, section:"Coro 2",  es:"Hacia el más allá de ese sueño que vi aquel día", ro:"Ano hi mita yume no saki e", kj:"あの日見た夢の先へ"},
  {t:3*60+23.67, section:"Coro 2",  es:"Atravesando el presente, hacia el más allá del mañana", ro:"Ima wo nukete asu no saki e", kj:"今を抜けて明日の先へ"},
  {t:3*60+29.92, section:"Coro 2",  es:"Hacia ti, a quien volví a encontrar", ro:"Mata deaeta kimi e", kj:"また出会えた君へ"},
  {t:3*60+34.43, section:"Outro",   es:"Solo un poco más — por favor, que no termine", ro:"Mou chotto, douka owaranaide", kj:"もうちょっと、どうか終わらないで"},
  {t:3*60+36.95, section:"Outro",   es:"Solo un poco más — mira, el último fuego artificial", ro:"Mou chotto, hora saigo no hanabi ga", kj:"もうちょっと、ほら最後の花火が"},
  {t:3*60+41.00, section:"Outro",   es:"Al cielo en el que pusimos nuestros deseos — mañana llegará", ro:"Negai wo kometa sora ni ashita ga kuru", kj:"願いを込めた空に明日が来る"},
];
</script>

<script>
(function(){
  const audio = document.getElementById('audio');
  let activeIdx = -1;
  const container = document.getElementById('lyricsContainer');
  let curSection = null;
  LYRICS.forEach((line,i)=>{
    if(line.section !== curSection){
      curSection = line.section;
      const sl = document.createElement('div');
      sl.className='section-label';
      sl.innerHTML=`<span>${line.section}</span>`;
      container.appendChild(sl);
    }
    const b=document.createElement('div');
    b.className='lyric-block';b.dataset.idx=i;
    let h='';
    if(line.es) h+=`<div class="lyric-es">${line.es}</div>`;
    if(line.ro) h+=`<div class="lyric-romaji">${line.ro}</div>`;
    if(line.kj) h+=`<div class="lyric-kanji">${line.kj}</div>`;
    b.innerHTML=h;
    b.addEventListener('click',()=>{ audio.currentTime=line.t; });
    container.appendChild(b);
  });
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const scrollBtn = document.getElementById('scrollBtn');
  scrollBtn.addEventListener('click',()=>{
    const blocks=document.querySelectorAll('.lyric-block');
    if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
  });
  function updateActive(t){
    document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
    document.getElementById('timeNow').textContent=fmt(t);
    let newActive=-1;
    for(let i=0;i<LYRICS.length;i++){ if(t>=LYRICS[i].t) newActive=i; }
    const blocks=document.querySelectorAll('.lyric-block');
    if(newActive!==activeIdx){
      activeIdx=newActive;
      blocks.forEach((b,i)=>{ b.classList.toggle('active',i===activeIdx); b.classList.toggle('past',i<activeIdx); });
      if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
    }
    scrollBtn.classList.toggle('active',activeIdx>=0);
  }
  audio.addEventListener('loadedmetadata',()=>{ document.getElementById('timeTotal').textContent=fmt(audio.duration); });
  audio.addEventListener('timeupdate',()=>{ updateActive(audio.currentTime); });
  audio.addEventListener('ended',()=>{
    document.body.classList.remove('is-playing');
    document.getElementById('visualizer').classList.remove('playing');
    document.getElementById('playBtn').textContent='▶ Play';
    scrollBtn.classList.remove('active');
  });
  document.getElementById('progressBar').addEventListener('click',e=>{
    const r=e.currentTarget.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);
  });
  const playBtn=document.getElementById('playBtn');
  playBtn.addEventListener('click',()=>{
    if(audio.paused){ audio.play();playBtn.textContent='⏸ Pausa';document.body.classList.add('is-playing');document.getElementById('visualizer').classList.add('playing');}
    else{ audio.pause();playBtn.textContent='▶ Play';document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');}
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    audio.pause();audio.currentTime=0;activeIdx=-1;
    playBtn.textContent='▶ Play';document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');
    document.querySelectorAll('.lyric-block').forEach(b=>b.classList.remove('active','past'));
    scrollBtn.classList.remove('active');window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('vol').addEventListener('input',e=>{ audio.volume=parseFloat(e.target.value); });
  audio.volume=0.8;
  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const v=btn.dataset.view;
      document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all') document.body.classList.add('view-'+v);
      if(!audio.paused) document.body.classList.add('is-playing');
    });
  });
  const vizEl=document.getElementById('visualizer');
  for(let i=0;i<48;i++){
    const bar=document.createElement('div');bar.className='bar';
    const mh=8+Math.sin(i*0.4)*22+Math.random()*16;
    bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;
    vizEl.appendChild(bar);
  }
})();
</script>
</body>
</html>
