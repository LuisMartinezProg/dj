<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANE DOE · Kenshi Yonezu × Hikaru Utada</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#c8c8c8;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(255,255,255,0.03) 0%,transparent 70%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(8,8,8,0.9);border:1px solid rgba(200,200,200,0.12);color:#c8c8c8;padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
.back-btn:hover{background:rgba(200,200,200,0.06)}
.card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:380px;width:100%}

.panels-wrap{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.panel{display:flex;flex-direction:column;border-radius:14px;overflow:hidden;border:1px solid rgba(200,200,200,0.07);background:#111111;box-shadow:0 4px 24px rgba(0,0,0,0.6);transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s}
.panel:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.5);border-color:rgba(200,200,200,0.2)}
.panel-cover{text-decoration:none;color:inherit}
.panel-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:#1a1a1a;position:relative}
.panel-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.88) saturate(0.85);transition:filter 0.35s,transform 0.35s}
.panel-cover:hover .panel-img{filter:brightness(1) saturate(0.95);transform:scale(1.04)}
.panel-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,0.5) 0%,transparent 50%);pointer-events:none}
.panel-video-wrap{width:100%;aspect-ratio:1/1;background:#1a1a1a;position:relative;overflow:hidden}
.panel-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.panel-label{padding:0.6rem 1rem;font-size:0.65rem;letter-spacing:0.28em;text-transform:uppercase;color:#3a3a3a;text-align:center;border-top:1px solid rgba(200,200,200,0.06);background:#1a1a1a;display:flex;align-items:center;justify-content:center;gap:0.45rem;transition:color 0.2s}
.panel:hover .panel-label{color:#c8c8c8}
.panel-label-icon{font-size:0.85rem}

.info{text-align:center}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,3rem);font-weight:300;color:#f0f0f0;letter-spacing:0.2em;margin-bottom:0.4rem}
.artist-name{font-size:0.78rem;letter-spacing:0.4em;text-transform:uppercase;color:#3a3a3a;margin-bottom:0.2rem}
.year{font-size:0.72rem;letter-spacing:0.2em;color:#2a2a2a}

@media(max-width:400px){.panels-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="card">
  <div class="panels-wrap">
    <a class="panel panel-cover" href="jane-letras.html">
      <div class="panel-img-wrap">
        <img class="panel-img" src="Jane imagen.jpg" alt="JANE DOE cover" onerror="this.parentElement.style.background='#1a1a1a'">
        <div class="panel-img-overlay"></div>
      </div>
      <div class="panel-label"><span class="panel-label-icon">歌詞</span> Letras</div>
    </a>
    <div class="panel">
      <div class="panel-video-wrap">
        <iframe src="https://drive.google.com/file/d/1G0AKw-4E622SBahipv1oCAJpEluvQ2Rl/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
      <div class="panel-label"><span class="panel-label-icon">🎬</span> Video</div>
    </div>
  </div>
  <div class="info">
    <div class="song-title">JANE DOE</div>
    <div class="artist-name">Kenshi Yonezu × Hikaru Utada</div>
    <div class="year">Chainsaw Man: Reze Arc · 2025</div>
  </div>
</div>
</body>
</html>
