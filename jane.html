<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANE DOE · Kenshi Yonezu × Hikaru Utada</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#d4ccc4;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(100,10,10,0.12) 0%,transparent 70%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(5,5,5,0.9);border:1px solid rgba(232,224,216,0.15);color:#d4ccc4;padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}
.card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:380px;width:100%}
.cover-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:2px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8),0 0 0 1px rgba(232,224,216,0.06)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(5,5,5,0.6) 100%)}
.info{text-align:center}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,3rem);font-weight:300;color:#ffffff;letter-spacing:0.2em;margin-bottom:0.4rem}
.artist-name{font-size:0.78rem;letter-spacing:0.4em;text-transform:uppercase;color:#3a3530;margin-bottom:0.2rem}
.year{font-size:0.72rem;letter-spacing:0.2em;color:#2a2520}
.btn-lyrics{display:inline-flex;align-items:center;gap:0.6rem;margin-top:1.8rem;padding:0.85rem 2.4rem;border:1px solid rgba(232,224,216,0.3);border-radius:999px;color:#e8e0d8;text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:0.15em;transition:all 0.3s;background:transparent}
.btn-lyrics:hover{background:rgba(232,224,216,0.06);border-color:rgba(232,224,216,0.6);color:#ffffff;box-shadow:0 0 20px rgba(140,26,26,0.2)}
.red-dot{width:6px;height:6px;border-radius:50%;background:#8c1a1a;box-shadow:0 0 8px rgba(140,26,26,0.8)}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="card">
  <div class="cover-wrap">
    <img src="Jane imagen.jpg" alt="JANE DOE cover">
    <div class="cover-overlay"></div>
  </div>
  <div class="info">
    <div class="song-title">JANE DOE</div>
    <div class="artist-name">Kenshi Yonezu × Hikaru Utada</div>
    <div class="year">Chainsaw Man: Reze Arc · 2025</div>
    <a class="btn-lyrics" href="jane-letras.html">
      <span class="red-dot"></span>
      Ver letra sincronizada
    </a>
  </div>
</div>
</body>
</html>
