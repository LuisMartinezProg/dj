<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしに花束を · Bouquet for Me — Ado</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0e04;color:#fff8e0;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(245,200,66,0.09) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(15,14,4,0.9);border:1px solid rgba(245,200,66,0.2);color:#f5c842;padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}
.card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:380px;width:100%}
.cover-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(245,200,66,0.1)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(15,14,4,0.55) 100%)}
.info{text-align:center}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:600;background:linear-gradient(135deg,#f5c842,#ffea80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem;line-height:1.3}
.song-sub{font-family:'Cormorant Garamond',serif;font-size:0.9rem;color:#f5c842;opacity:0.6;font-style:italic;margin-bottom:0.3rem}
.artist-name{font-size:0.78rem;letter-spacing:0.4em;text-transform:uppercase;color:#5a4a10}
.btn-lyrics{display:inline-flex;align-items:center;gap:0.6rem;margin-top:1.8rem;padding:0.85rem 2.4rem;border:1px solid rgba(245,200,66,0.3);border-radius:999px;color:#f5c842;text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:0.12em;transition:all 0.3s;background:transparent}
.btn-lyrics:hover{background:rgba(245,200,66,0.08);border-color:rgba(245,200,66,0.6);color:#ffea80}
.dot{width:6px;height:6px;border-radius:50%;background:#f5c842;box-shadow:0 0 8px rgba(245,200,66,0.7)}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="card">
  <div class="cover-wrap">
    <img src="Bo-p.png" alt="Bouquet for Me">
    <div class="cover-overlay"></div>
  </div>
  <div class="info">
    <div class="song-title">わたしに花束を</div>
    <div class="song-sub">Bouquet for Me</div>
    <div class="artist-name">Ado · 2024</div>
    <a class="btn-lyrics" href="bouquet-letras.html"><span class="dot"></span>Ver letra sincronizada</a>
  </div>
</div>
</body>
</html>
