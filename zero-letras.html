<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060806;--card:#0e140e;--accent1:#7ecb35;--accent2:#b8f060;--accent3:#3a6010;--text:#e8f5d8;--muted:#2a4018;--glow:rgba(126,203,53,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 80% 20%,rgba(126,203,53,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 20% 80%,rgba(58,96,16,0.08) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(6,8,6,0.88);border:1px solid rgba(126,203,53,0.25);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}

@media(orientation:landscape){
  body{display:grid;grid-template-rows:auto 1fr;padding-bottom:0}
  .top-section{grid-row:1;display:flex;align-items:center;gap:1rem;padding:0.6rem 1.2rem;border-bottom:1px solid rgba(126,203,53,0.1);background:var(--bg);position:sticky;top:0;z-index:50}
  .landscape-layout{grid-row:2;display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 110px)}
  .controls-panel{padding:1rem;display:flex;flex-direction:column;gap:0.6rem;border-right:1px solid rgba(126,203,53,0.1);overflow-y:auto}
  .lyrics-panel{overflow-y:auto;padding:0.5rem 1rem}
  .progress-section,.controls,.volume-row,.view-toggles{padding:0.4rem 0}
  .back-btn{display:none}
  .scroll-btn{bottom:1rem;right:1rem}
}
@media(orientation:portrait){
  .top-section{display:none}
  .landscape-layout{display:contents}
  .controls-panel{display:contents}
  .lyrics-panel{display:contents}
}

header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(126,203,53,0.1)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,10vw,5rem);font-weight:300;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.2em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.85rem;font-weight:300;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:44px;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.35;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:5px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:var(--bg);padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(126,203,53,0.25);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(126,203,53,0.2);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(126,203,53,0.1);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.62rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;display:flex;align-items:center;gap:0.8rem;opacity:0.5}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(126,203,53,0.12)}
.lyric-block{padding:1rem 1.4rem;margin-bottom:0.4rem;border-radius:8px;border:1px solid transparent;transition:all 0.3s ease;cursor:pointer;opacity:0.28}
.lyric-block.past{opacity:0.14}
.lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(58,96,16,0.2),rgba(126,203,53,0.06));border-color:rgba(126,203,53,0.4);box-shadow:0 0 24px rgba(126,203,53,0.1);transform:translateX(4px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.5rem);font-weight:400;color:var(--text);line-height:1.4;margin-bottom:0.3rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.85rem,2vw,1rem);color:var(--accent1);opacity:0.75;margin-bottom:0.25rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.8rem,1.8vw,0.95rem);color:var(--accent2);opacity:0.5;font-weight:300;letter-spacing:0.06em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;opacity:0.45;color:var(--bg)}

</style>

(function(){
  const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),scrollBtn=document.getElementById('scrollBtn');
  let activeIdx=-1;
  const container=document.getElementById('lyricsContainer');
  let cur=null;
  LYRICS.forEach((line,i)=>{
    if(line.section!==cur){cur=line.section;const sl=document.createElement('div');sl.className='section-label';sl.innerHTML=`<span>${line.section}</span>`;container.appendChild(sl);}
    const b=document.createElement('div');b.className='lyric-block';
    b.innerHTML=`<div class="lyric-es">${line.es}</div><div class="lyric-romaji">${line.ro}</div><div class="lyric-kanji">${line.kj}</div>`;
    b.addEventListener('click',()=>{audio.currentTime=line.t;});
    container.appendChild(b);
  });
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const blocks=()=>document.querySelectorAll('.lyric-block');
  function updateActive(t){
    document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
    document.getElementById('timeNow').textContent=fmt(t);
    let n=-1;for(let i=0;i<LYRICS.length;i++){if(t>=LYRICS[i].t)n=i;}
    if(n===activeIdx)return;
    activeIdx=n;
    blocks().forEach((b,i)=>{b.classList.toggle('active',i===activeIdx);b.classList.toggle('past',i<activeIdx);});
    scrollBtn.classList.toggle('active',activeIdx>=0);
    const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  }
  audio.addEventListener('loadedmetadata',()=>{document.getElementById('timeTotal').textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',()=>updateActive(audio.currentTime));
  audio.addEventListener('ended',()=>{document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');playBtn.textContent='▶ Play';scrollBtn.classList.remove('active');});
  document.getElementById('progressBar').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);});
  playBtn.addEventListener('click',()=>{
    if(audio.paused){audio.play();playBtn.textContent='⏸ Pausa';document.body.classList.add('is-playing');document.getElementById('visualizer').classList.add('playing');}
    else{audio.pause();playBtn.textContent='▶ Play';document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');}
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    audio.pause();audio.currentTime=0;activeIdx=-1;playBtn.textContent='▶ Play';
    document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');
    blocks().forEach(b=>b.classList.remove('active','past'));scrollBtn.classList.remove('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('vol').addEventListener('input',e=>{audio.volume=parseFloat(e.target.value);});audio.volume=0.8;
  scrollBtn.addEventListener('click',()=>{const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});});
  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      const v=btn.dataset.view;document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all')document.body.classList.add('view-'+v);if(!audio.paused)document.body.classList.add('is-playing');
    });
  });
  ['visualizer','miniViz'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    for(let i=0;i<(id==='miniViz'?24:48);i++){const bar=document.createElement('div');bar.className='bar';const mh=6+Math.sin(i*0.4)*16+Math.random()*12;bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;el.appendChild(bar);}
  });
})();
</script>
</body>
</html>
