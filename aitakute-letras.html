<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会いたくて · Aitakute — Ado</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#120e0e;--card:#1e1618;--accent1:#d4a0a8;--accent2:#f0c8d0;--accent3:#6b3040;--text:#f0e8ec;--muted:#4a3038;--glow:rgba(212,160,168,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 30% 20%,rgba(180,80,100,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 70% 80%,rgba(100,40,60,0.06) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(18,14,14,0.88);border:1px solid rgba(212,160,168,0.25);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}

/* LAYOUT LANDSCAPE */
@media(orientation:landscape){
  body{display:grid;grid-template-rows:auto 1fr;padding-bottom:0}
  .top-section{grid-row:1;display:flex;align-items:center;gap:1rem;padding:0.6rem 1.2rem;border-bottom:1px solid rgba(212,160,168,0.1);background:var(--bg);position:sticky;top:0;z-index:50}
  .landscape-layout{grid-row:2;display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 110px)}
  .controls-panel{padding:1rem;display:flex;flex-direction:column;gap:0.6rem;border-right:1px solid rgba(212,160,168,0.1);overflow-y:auto}
  .lyrics-panel{overflow-y:auto;padding:0.5rem 1rem}
  .progress-section{padding:0.4rem 0}
  .controls{padding:0.4rem 0;gap:0.6rem}
  .volume-row{padding:0.2rem 0}
  .view-toggles{padding:0.2rem 0}
  .back-btn{display:none}
  .scroll-btn{bottom:1rem;right:1rem}
}
@media(orientation:portrait){
  .top-section{display:none}
  .landscape-layout{display:contents}
  .controls-panel{display:contents}
  .lyrics-panel{display:contents}
}

header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(212,160,168,0.1)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.85rem;font-weight:300;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:44px;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.35;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:5px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(212,160,168,0.25);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(212,160,168,0.2);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(212,160,168,0.1);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.62rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;display:flex;align-items:center;gap:0.8rem;opacity:0.5}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(212,160,168,0.12)}
.lyric-block{padding:1rem 1.4rem;margin-bottom:0.4rem;border-radius:12px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.28}
.lyric-block.past{opacity:0.14}
.lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(107,48,64,0.15),rgba(212,160,168,0.07));border-color:rgba(212,160,168,0.35);box-shadow:0 0 28px rgba(212,160,168,0.1);transform:translateX(5px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.8vw,1.65rem);font-weight:400;color:var(--text);line-height:1.35;margin-bottom:0.3rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.9rem,2.2vw,1.1rem);color:var(--accent1);opacity:0.75;margin-bottom:0.25rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.85rem,1.9vw,1rem);color:var(--accent2);opacity:0.55;font-weight:300;letter-spacing:0.06em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;opacity:0.45;color:white}
.scroll-btn:hover{transform:scale(1.1);opacity:1}
.scroll-btn.active{opacity:1}

/* Landscape mini visualizer */
.top-section .mini-viz{display:flex;align-items:flex-end;gap:2px;height:28px}
.top-section .mini-viz .bar{width:3px}
.top-section .song-info{flex:1}
.top-section .song-info .t{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--accent2);letter-spacing:0.05em}
.top-section .song-info .a{font-size:0.7rem;color:var(--muted);letter-spacing:0.2em}
</style>
</head>
<body>
<a class="back-btn" href="aitakute.html">← Volver</a>
<audio id="audio" src="Ait-m.mp3" preload="auto"></audio>

<!-- LANDSCAPE TOP BAR -->
<div class="top-section">
  <div class="song-info">
    <div class="t">会いたくて · Aitakute</div>
    <div class="a">ADO · 2021</div>
  </div>
  <div class="mini-viz playing" id="miniViz"></div>
</div>

<div class="landscape-layout">
<!-- PANEL IZQUIERDO (landscape) / normal en portrait -->
<div class="controls-panel">
  <header>
    <div class="song-title">会いたくて</div>
    <div class="artist-name">Ado · 2021</div>
    <div class="visualizer-wrap playing" id="visualizer"></div>
  </header>
  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-row"><span id="timeNow">0:00</span><span id="timeTotal">—</span></div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="playBtn">▶ Play</button>
    <button class="btn btn-secondary" id="resetBtn">↩</button>
  </div>
  <div class="volume-row">
    <span>🔈</span><input type="range" id="vol" min="0" max="1" step="0.05" value="0.8"><span>🔊</span>
  </div>
  <div class="view-toggles">
    <button class="toggle-btn active" data-view="all">Todo</button>
    <button class="toggle-btn" data-view="es">ES</button>
    <button class="toggle-btn" data-view="romaji">ROM</button>
    <button class="toggle-btn" data-view="kanji">JP</button>
  </div>
</div>

<!-- PANEL DERECHO / letras -->
<div class="lyrics-panel">
  <div class="lyrics-container" id="lyricsContainer"></div>
</div>
</div>

<button class="scroll-btn" id="scrollBtn">♪</button>

<script>
const LYRICS = [
  {t:0.68,  section:"Verso 1",   es:"Poco a poco he empezado a entenderte",                                    ro:"Sukoshi zutsu wakari hajimeta",                          kj:"少しずつ分かり始めた"},
  {t:6.47,  section:"Verso 1",   es:"Tus manías, lo que podrías estar pensando",                               ro:"Kimi no kuse kangaesou na koto",                         kj:"君の癖 考えそうなこと"},
  {t:12.75, section:"Verso 1",   es:"Aunque tengo cosas que quiero decirte",                                   ro:"Tsutaetai koto ga aru no ni",                            kj:"伝えたいことがあるのに"},
  {t:18.49, section:"Verso 1",   es:"Se me atoran en el fondo del pecho",                                      ro:"Mune no oku tsukkaerun da",                              kj:"胸の奥つっかえるんだ"},
  {t:24.03, section:"Verso 1",   es:"Si no me muevo, seguiremos a esta distancia",                             ro:"Ugokidasanakya kono kyori no mama",                      kj:"動き出さなきゃ この距離のまま"},
  {t:30.27, section:"Verso 1",   es:"Sé que no puedo acercarme, pero…",                                        ro:"Chikazukenai to wakatteru kedo",                         kj:"近づけないと分かってるけど"},
  {t:36.46, section:"Verso 1",   es:"Un corazón débil y un orgullo fuerte",                                    ro:"Yowai kokoro to tsuyoi puraido ga",                      kj:"弱い心と強いプライドが"},
  {t:42.55, section:"Verso 1",   es:"Vuelven a interponerse, pero ahora…",                                     ro:"Mata jama wo suru demo ima wa",                          kj:"また邪魔をする でも今は"},
  {t:51.23, section:"Coro 1",    es:"Quiero verte, quiero verte",                                              ro:"Aitakute, aitakute",                                     kj:"会いたくて 会いたくて"},
  {t:57.55, section:"Coro 1",    es:"Los sentimientos que se desbordan superan el límite",                     ro:"Afuredasu omoi ga genkai wo koete",                      kj:"溢れ出す想いが限界を越えて"},
  {t:63.34, section:"Coro 1",    es:"El mundo está envuelto en amor",                                          ro:"Sekai wa ai ni tsutsumareta",                            kj:"世界は愛につつまれた"},
  {t:69.60, section:"Coro 1",    es:"Vayamos juntos a transmitirlo",                                           ro:"Ainori shite tsutaeyou",                                 kj:"相乗りして伝えよう"},
  {t:75.56, section:"Coro 1",    es:"Quiero verte, pero no puedo verte",                                       ro:"Aitakute, aenakute",                                     kj:"会いたくて 会えなくて"},
  {t:81.37, section:"Coro 1",    es:"Los sentimientos que se cruzan se van acumulando",                        ro:"Surechigau omoi wo kasaneate",                           kj:"すれ違う想いを重ね合って"},
  {t:87.61, section:"Coro 1",    es:"Siguiendo el rastro hacia ti",                                            ro:"Kimi e no kiseki wo tadotte",                            kj:"君への軌跡を辿って"},
  {t:94.28, section:"Coro 1",    es:"Tengo que empezar a correr ahora",                                        ro:"Ima hashiridasanakucha",                                 kj:"今走りださなくちゃ"},
  {t:99.95, section:"Coro 1",    es:"Antes de pisar el freno",                                                 ro:"Bureeki kakeru mae ni",                                  kj:"ブレーキかける前に"},
  {t:114.81,section:"Verso 2",   es:"Muchas veces, decenas de veces",                                          ro:"Nangai mo, iya nan juukkai mo",                          kj:"何回も いや何十回も"},
  {t:121.13,section:"Verso 2",   es:"Aunque nos miramos a los ojos",                                          ro:"Kimi to me wo awaseteru no ni",                          kj:"君と目を合わせてるのに"},
  {t:127.01,section:"Verso 2",   es:"Cuanto más te miro, más…",                                               ro:"Mitsumereba mitsumeru hodo ni",                          kj:"見つめれば見つめるほどに"},
  {t:132.97,section:"Verso 2",   es:"¿Por qué mi corazón late más rápido?",                                    ro:"Naze kodou wa supiido wo masu no",                       kj:"なぜ鼓動はスピードを増すの"},
  {t:138.59,section:"Verso 2",   es:"En los momentos felices, déjame llamarte",                                ro:"Ureshii toki wa yobasete kimi wo",                       kj:"嬉しい時は呼ばせて君を"},
  {t:144.59,section:"Verso 2",   es:"En los momentos tristes, llámame a mí",                                   ro:"Kanashii toki wa yonde watashi wo",                      kj:"悲しい時は呼んで私を"},
  {t:150.69,section:"Verso 2",   es:"Tanto mi corazón débil como mi orgullo fuerte",                           ro:"Yowai kokoro mo tsuyoi puraido mo",                      kj:"弱い心も 強いプライドも"},
  {t:156.42,section:"Verso 2",   es:"Porque quiero que lo sepas todo",                                         ro:"Subete wo shitte hoshii kara",                           kj:"全てを知ってほしいから"},
  {t:165.33,section:"Coro 2",    es:"Quiero verte, quiero verte",                                              ro:"Aitakute, aitakute",                                     kj:"会いたくて 会いたくて"},
  {t:171.78,section:"Coro 2",    es:"No hay valor absoluto en los sentimientos que se desbordan",              ro:"Afure dasu omoi ni zettaichi wa nakute",                 kj:"溢れ出す想いに絶対値はなくて"},
  {t:177.55,section:"Coro 2",    es:"El mundo está envuelto en amor",                                          ro:"Sekai wa ai ni tsutsumareta",                            kj:"世界は愛につつまれた"},
  {t:183.84,section:"Coro 2",    es:"Vayamos juntos a transmitirlo",                                           ro:"Ainori shite tsutaeyou",                                 kj:"相乗りして伝えよう"},
  {t:190.40,section:"Puente",    es:"Tu sonrisa arrugada",                                                     ro:"Kushakusha ni waratta kao mo",                           kj:"くしゃくしゃに笑った顔も"},
  {t:193.39,section:"Puente",    es:"Tu expresión un poco solitaria",                                          ro:"Sukoshi sabishi sou na kao mo",                          kj:"少し寂しそうな顔も"},
  {t:196.52,section:"Puente",    es:"Siempre quiero estar junto a ti, a tu lado, mirándote",                   ro:"Itsumo soba de kimi no yoko de miteitakute",             kj:"いつもそばで 君の横で見ていたくて"},
  {t:202.08,section:"Puente",    es:"Cargando este amor caprichoso con torpes palabras",                       ro:"Wagamama na ai wo hetakuso na kotoba ni nose hakobu yo", kj:"わがままな愛を 下手くそな言葉に乗せ運ぶよ"},
  {t:216.55,section:"Coro Final",es:"Quiero verte, quiero verte",                                              ro:"Aitakute, aitakute",                                     kj:"会いたくて 会いたくて"},
  {t:222.62,section:"Coro Final",es:"Los sentimientos que se desbordan superan el límite",                     ro:"Afuredasu omoi ga genkai wo koete",                      kj:"溢れ出す想いが限界を越えて"},
  {t:228.71,section:"Coro Final",es:"El mundo está envuelto en amor",                                          ro:"Sekai wa ai ni tsutsumareta",                            kj:"世界は愛につつまれた"},
  {t:235.12,section:"Coro Final",es:"Vayamos juntos a transmitirlo",                                           ro:"Ainori shite tsutaeyou",                                 kj:"相乗りして伝えよう"},
  {t:240.59,section:"Coro Final",es:"Quiero verte, pero no puedo verte",                                       ro:"Aitakute, aenakute",                                     kj:"会いたくて 会えなくて"},
  {t:246.77,section:"Coro Final",es:"Aunque los sentimientos que se cruzan se van acumulando",                 ro:"Surechigau omoi ga kasabatemo",                          kj:"すれ違う想いが嵩張っても"},
  {t:252.65,section:"Coro Final",es:"Siguiendo el rastro hacia ti",                                            ro:"Kimi e no kiseki wo tadotte",                            kj:"君への軌跡を辿って"},
  {t:258.24,section:"Coro Final",es:"Porque ahora voy corriendo",                                              ro:"Ima hashitte iku kara",                                  kj:"今走っていくから"},
  {t:264.42,section:"Coro Final",es:"Antes de pisar el freno",                                                 ro:"Bureeki kakeru mae ni",                                  kj:"ブレーキかける前に"},
];

(function(){
  const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),scrollBtn=document.getElementById('scrollBtn');
  let activeIdx=-1;
  const container=document.getElementById('lyricsContainer');
  let cur=null;
  LYRICS.forEach((line,i)=>{
    if(line.section!==cur){cur=line.section;const sl=document.createElement('div');sl.className='section-label';sl.innerHTML=`<span>${line.section}</span>`;container.appendChild(sl);}
    const b=document.createElement('div');b.className='lyric-block';
    b.innerHTML=`<div class="lyric-es">${line.es}</div><div class="lyric-romaji">${line.ro}</div><div class="lyric-kanji">${line.kj}</div>`;
    b.addEventListener('click',()=>{audio.currentTime=line.t;});
    container.appendChild(b);
  });
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const blocks=()=>document.querySelectorAll('.lyric-block');
  function updateActive(t){
    document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
    document.getElementById('timeNow').textContent=fmt(t);
    let n=-1;for(let i=0;i<LYRICS.length;i++){if(t>=LYRICS[i].t)n=i;}
    if(n===activeIdx)return;
    activeIdx=n;
    blocks().forEach((b,i)=>{b.classList.toggle('active',i===activeIdx);b.classList.toggle('past',i<activeIdx);});
    scrollBtn.classList.toggle('active',activeIdx>=0);
    const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  }
  audio.addEventListener('loadedmetadata',()=>{document.getElementById('timeTotal').textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',()=>updateActive(audio.currentTime));
  audio.addEventListener('ended',()=>{document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');playBtn.textContent='▶ Play';scrollBtn.classList.remove('active');});
  document.getElementById('progressBar').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);});
  playBtn.addEventListener('click',()=>{
    if(audio.paused){audio.play();playBtn.textContent='⏸ Pausa';document.body.classList.add('is-playing');document.getElementById('visualizer').classList.add('playing');}
    else{audio.pause();playBtn.textContent='▶ Play';document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');}
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    audio.pause();audio.currentTime=0;activeIdx=-1;playBtn.textContent='▶ Play';
    document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');
    blocks().forEach(b=>b.classList.remove('active','past'));scrollBtn.classList.remove('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('vol').addEventListener('input',e=>{audio.volume=parseFloat(e.target.value);});audio.volume=0.8;
  scrollBtn.addEventListener('click',()=>{const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});});
  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      const v=btn.dataset.view;document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all')document.body.classList.add('view-'+v);if(!audio.paused)document.body.classList.add('is-playing');
    });
  });
  ['visualizer','miniViz'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    for(let i=0;i<(id==='miniViz'?24:48);i++){const bar=document.createElement('div');bar.className='bar';const mh=6+Math.sin(i*0.4)*16+Math.random()*12;bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;el.appendChild(bar);}
  });
})();
</script>
</body>
</html>
