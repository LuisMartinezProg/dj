<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0800;--card:#1a1000;--accent1:#e8732a;--accent2:#f5b87a;--accent3:#8b3a00;--text:#fff5ee;--muted:#6b4a2a;--glow:rgba(232,115,42,0.35)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:160px}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(140,60,0,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(100,30,0,0.08) 0%,transparent 60%);z-index:0;pointer-events:none}
  .back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(15,8,0,0.85);border:1px solid rgba(232,115,42,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
  header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(232,115,42,0.15)}
  .song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem}
  .artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
  .visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
  .bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.4;height:4px}
  @keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
  .playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
  audio{display:none}
  .progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
  .progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
  .time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
  .controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
  .btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
  .btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
  .btn-primary:hover{transform:scale(1.05)}
  .btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(232,115,42,0.3);padding:0.75rem 1.3rem;font-size:0.9rem}
  .volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
  .volume-row span{color:var(--muted);font-size:0.8rem}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
  .view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
  .toggle-btn{border:1px solid rgba(232,115,42,0.25);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}

<script>
(function(){
const STORAGE_KEY = 'musci_sync_bunny';
const audio = document.getElementById('audio');
let activeIdx = -1;
let sectionOffsets = {};
try { const s = localStorage.getItem(STORAGE_KEY); if(s) sectionOffsets = JSON.parse(s); } catch(e){}
function saveOffsets(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sectionOffsets)); }catch(e){} }
function adjTime(line){ return line.t + (sectionOffsets[line.section]||0); }

const container = document.getElementById('lyricsContainer');
let curSection = null;
LYRICS.forEach((line,i)=>{
  if(line.section !== curSection){
    curSection = line.section;
    const sl = document.createElement('div');
    sl.className='section-label';
    sl.dataset.section=line.section;
    const off=sectionOffsets[line.section]||0;
    sl.innerHTML=`<span>${line.section}</span><div class="section-adj"><button class="btn-sadj" data-sec="${line.section}" data-d="-1">-1s</button><span class="sadj-val" id="sadj-${line.section}">${off>=0?'+':''}${off}s</span><button class="btn-sadj" data-sec="${line.section}" data-d="1">+1s</button></div>`;
    container.appendChild(sl);
  }
  const b=document.createElement('div');
  b.className='lyric-block';b.dataset.idx=i;
  let h='';
  if(line.es) h+=`<div class="lyric-es">${line.es}</div>`;
  if(line.ro) h+=`<div class="lyric-romaji">${line.ro}</div>`;
  if(line.kj) h+=`<div class="lyric-kanji">${line.kj}</div>`;
  b.innerHTML=h;
  b.addEventListener('click',()=>{ audio.currentTime=adjTime(line); });
  container.appendChild(b);
});

document.querySelectorAll('.btn-sadj').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const sec=btn.dataset.sec, d=parseInt(btn.dataset.d);
    sectionOffsets[sec]=(sectionOffsets[sec]||0)+d;
    saveOffsets();
    const el=document.getElementById('sadj-'+sec);
    if(el){ const v=sectionOffsets[sec]; el.textContent=(v>=0?'+':'')+v+'s'; }
    updateActive(audio.currentTime);
  });
});

const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const barEs=document.getElementById('kbarEs');
const barRo=document.getElementById('kbarRo');
const barKj=document.getElementById('kbarKj');
const barIdle=document.getElementById('kbarIdle');
let lastBarIdx=-2;

function updateBar(idx, currentTime){
  if(idx===lastBarIdx) return;
  lastBarIdx=idx;
  if(idx<0){
    barEs.textContent=''; barRo.textContent=''; barKj.textContent='';
    barIdle.style.display='block';
    if(!audio.paused && currentTime>0 && currentTime<INSTRUMENTAL_END){
      barIdle.textContent='♪ Instrumental';
    } else {
      barIdle.textContent='♪ presiona play para comenzar';
    }
    return;
  }
  barIdle.style.display='none';
  const line=LYRICS[idx];
  [barEs,barRo,barKj].forEach(el=>{ el.style.animation='none'; el.offsetHeight; el.style.animation=''; });
  barEs.textContent=line.es||'';
  barRo.textContent=line.ro||'';
  barKj.textContent=line.kj||'';
}

function updateActive(t){
  document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
  document.getElementById('timeNow').textContent=fmt(t);
  let newActive=-1;
  for(let i=0;i<LYRICS.length;i++){
    if(t>=adjTime(LYRICS[i])) newActive=i;
  }
  const blocks=document.querySelectorAll('.lyric-block');
  if(newActive!==activeIdx){
    activeIdx=newActive;
    blocks.forEach((b,i)=>{ b.classList.toggle('active',i===activeIdx); b.classList.toggle('past',i<activeIdx); });
    if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
  }
  updateBar(activeIdx, t);
}

audio.addEventListener('loadedmetadata',()=>{ document.getElementById('timeTotal').textContent=fmt(audio.duration); });
audio.addEventListener('timeupdate',()=>{ updateActive(audio.currentTime); });
audio.addEventListener('ended',()=>{
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.getElementById('playBtn').textContent='▶ Play';
  barIdle.style.display='block'; barIdle.textContent='♪ presiona play para comenzar';
  barEs.textContent=''; barRo.textContent=''; barKj.textContent='';
  lastBarIdx=-2;
});

document.getElementById('progressBar').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);
});

const playBtn=document.getElementById('playBtn');
playBtn.addEventListener('click',()=>{
  if(audio.paused){
    audio.play(); playBtn.textContent='⏸ Pausa';
    document.body.classList.add('is-playing');
    document.getElementById('visualizer').classList.add('playing');
  } else {
    audio.pause(); playBtn.textContent='▶ Play';
    document.body.classList.remove('is-playing');
    document.getElementById('visualizer').classList.remove('playing');
  }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  audio.pause(); audio.currentTime=0; activeIdx=-1; lastBarIdx=-2;
  playBtn.textContent='▶ Play';
  document.body.classList.remove('is-playing');
  document.getElementById('visualizer').classList.remove('playing');
  document.querySelectorAll('.lyric-block').forEach(b=>b.classList.remove('active','past'));
  barEs.textContent=''; barRo.textContent=''; barKj.textContent='';
  barIdle.style.display='block'; barIdle.textContent='♪ presiona play para comenzar';
  window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('vol').addEventListener('input',e=>{ audio.volume=parseFloat(e.target.value); });
audio.volume=0.8;

document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v=btn.dataset.view;
    document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
    if(v!=='all') document.body.classList.add('view-'+v);
    if(!audio.paused) document.body.classList.add('is-playing');
  });
});

const vizEl=document.getElementById('visualizer');
for(let i=0;i<48;i++){
  const bar=document.createElement('div'); bar.className='bar';
  const mh=8+Math.sin(i*0.4)*22+Math.random()*16;
  bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;
  vizEl.appendChild(bar);
}
})();
</script>
</body>
</html>
