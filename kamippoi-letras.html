<script>
(function(){
  const audio = document.getElementById('audio');
  let activeIdx = -1, sectionOffsets = {}, lastBarIdx = -2;
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) sectionOffsets = JSON.parse(s); } catch(e){}
  function saveOffsets(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sectionOffsets)); }catch(e){} }
  function adjTime(line){ return line.t + (sectionOffsets[line.section]||0); }

  const container = document.getElementById('lyricsContainer');
  let curSection = null;
  LYRICS.forEach((line,i)=>{
    if(line.section !== curSection){
      curSection = line.section;
      const sl = document.createElement('div'); sl.className='section-label'; sl.dataset.section=line.section;
      const off=sectionOffsets[line.section]||0;
      sl.innerHTML=`<span>${line.section}</span><div class="section-adj"><button class="btn-sadj" data-sec="${line.section}" data-d="-1">-1s</button><span class="sadj-val" id="sadj-${line.section}">${off>=0?'+':''}${off}s</span><button class="btn-sadj" data-sec="${line.section}" data-d="1">+1s</button></div>`;
      container.appendChild(sl);
    }
    const b=document.createElement('div'); b.className='lyric-block'; b.dataset.idx=i;
    let h='';
    if(line.es) h+=`<div class="lyric-es">${line.es}</div>`;
    if(line.ro) h+=`<div class="lyric-romaji">${line.ro}</div>`;
    if(line.kj) h+=`<div class="lyric-kanji">${line.kj}</div>`;
    b.innerHTML=h; b.addEventListener('click',()=>{ audio.currentTime=adjTime(line); }); container.appendChild(b);
  });

  document.querySelectorAll('.btn-sadj').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sec=btn.dataset.sec, d=parseInt(btn.dataset.d);
      sectionOffsets[sec]=(sectionOffsets[sec]||0)+d; saveOffsets();
      const el=document.getElementById('sadj-'+sec);
      if(el){ const v=sectionOffsets[sec]; el.textContent=(v>=0?'+':'')+v+'s'; }
      updateActive(audio.currentTime);
    });
  });

  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const scrollBtn=document.getElementById('scrollBtn');
  scrollBtn.addEventListener('click',()=>{ const blocks=document.querySelectorAll('.lyric-block'); if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'}); });

  function updateActive(t){
    document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
    document.getElementById('timeNow').textContent=fmt(t);
    let newActive=-1;
    for(let i=0;i<LYRICS.length;i++){ if(t>=adjTime(LYRICS[i])) newActive=i; }
    const blocks=document.querySelectorAll('.lyric-block');
    if(newActive!==activeIdx){
      activeIdx=newActive;
      blocks.forEach((b,i)=>{ b.classList.toggle('active',i===activeIdx); b.classList.toggle('past',i<activeIdx); });
      if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
    }
    if(activeIdx!==lastBarIdx){ lastBarIdx=activeIdx; scrollBtn.classList.toggle('active',activeIdx>=0); }
  }

  audio.addEventListener('loadedmetadata',()=>{ document.getElementById('timeTotal').textContent=fmt(audio.duration); });
  audio.addEventListener('error',()=>{ document.getElementById('audioError').classList.add('show'); });
  audio.addEventListener('timeupdate',()=>{ updateActive(audio.currentTime); });
  audio.addEventListener('ended',()=>{ document.body.classList.remove('is-playing'); document.getElementById('visualizer').classList.remove('playing'); document.getElementById('playBtn').textContent='▶ Play'; scrollBtn.classList.remove('active'); lastBarIdx=-2; });
  document.getElementById('progressBar').addEventListener('click',e=>{ const r=e.currentTarget.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0); });

  const playBtn=document.getElementById('playBtn');
  playBtn.addEventListener('click',()=>{
    if(audio.paused){ audio.play(); playBtn.textContent='⏸ Pausa'; document.body.classList.add('is-playing'); document.getElementById('visualizer').classList.add('playing'); }
    else { audio.pause(); playBtn.textContent='▶ Play'; document.body.classList.remove('is-playing'); document.getElementById('visualizer').classList.remove('playing'); }
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    audio.pause(); audio.currentTime=0; activeIdx=-1; lastBarIdx=-2;
    playBtn.textContent='▶ Play'; document.body.classList.remove('is-playing'); document.getElementById('visualizer').classList.remove('playing');
    document.querySelectorAll('.lyric-block').forEach(b=>b.classList.remove('active','past'));
    scrollBtn.classList.remove('active'); window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('vol').addEventListener('input',e=>{ audio.volume=parseFloat(e.target.value); }); audio.volume=0.8;
  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
      const v=btn.dataset.view; document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all') document.body.classList.add('view-'+v); if(!audio.paused) document.body.classList.add('is-playing');
    });
  });
  const vizEl=document.getElementById('visualizer');
  for(let i=0;i<48;i++){ const bar=document.createElement('div'); bar.className='bar'; const mh=8+Math.sin(i*0.4)*22+Math.random()*16; bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`; vizEl.appendChild(bar); }
})();
</script>
