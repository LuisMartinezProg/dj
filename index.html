<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎌 MochiGo Karaoke</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#09070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MochiGo Karaoke">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09070f;
    --card: #1a1230;
    --accent1: #c084fc;
    --accent2: #f472b6;
    --accent3: #818cf8;
    --text: #f1e9ff;
    --muted: #6b5e8c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 10% 10%, rgba(192,132,252,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 90% 90%, rgba(244,114,182,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(129,140,248,0.05) 0%, transparent 60%);
    z-index:0; pointer-events:none;
  }
  header {
    position:relative; z-index:1;
    text-align:center;
    padding:3.5rem 2rem 2rem;
  }
  .logo-kanji {
    font-family:'Noto Serif JP', serif;
    font-size:0.75rem;
    letter-spacing:0.4em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:0.6rem;
  }
  .logo-title {
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(2.5rem,8vw,4.5rem);
    font-weight:600;
    background:linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1;
    margin-bottom:0.5rem;
  }
  .logo-sub {
    font-size:0.8rem;
    color:var(--muted);
    letter-spacing:0.25em;
    font-weight:300;
  }
  /* Decorative line */
  .deco-line {
    display:flex; align-items:center; gap:1rem;
    max-width:300px; margin:1.8rem auto 0;
    opacity:0.4;
  }
  .deco-line::before, .deco-line::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent1));
  }
  .deco-line::after { background:linear-gradient(90deg, var(--accent1), transparent); }
  .deco-line span { color:var(--accent1); font-size:0.7rem; letter-spacing:0.2em; white-space:nowrap; }

  /* Songs grid */
  .songs-grid {
    position:relative; z-index:1;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap:1.2rem;
    max-width:900px;
    margin:2.5rem auto 0;
    padding:0 1.5rem 5rem;
  }
  .song-card {
    background: var(--card);
    border:1px solid rgba(192,132,252,0.15);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:all 0.3s ease;
    text-decoration:none;
    color:inherit;
    display:block;
    position:relative;
  }
  .song-card:hover {
    transform:translateY(-4px);
    border-color:rgba(192,132,252,0.5);
    box-shadow:0 12px 40px rgba(192,132,252,0.15);
  }
  .song-card:active { transform:translateY(-1px); }
  .card-cover {
    width:100%; aspect-ratio:16/9;
    object-fit:cover;
    display:block;
  }
  .card-cover-fallback {
    width:100%; aspect-ratio:16/9;
    display:flex; align-items:center; justify-content:center;
    font-size:3rem;
    position:relative; overflow:hidden;
  }
  .card-cover-fallback::before {
    content:''; position:absolute; inset:0;
    background:var(--grad);
    opacity:0.9;
  }
  .card-cover-fallback span { position:relative; z-index:1; }
  .card-body {
    padding:1.2rem 1.4rem 1.4rem;
  }
  .card-anime {
    font-size:0.68rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--accent1);
    margin-bottom:0.3rem;
    opacity:0.8;
  }
  .card-title {
    font-family:'Cormorant Garamond', serif;
    font-size:1.4rem;
    font-weight:600;
    margin-bottom:0.2rem;
    line-height:1.2;
  }
  .card-title-jp {
    font-family:'Noto Serif JP', serif;
    font-size:0.8rem;
    color:var(--muted);
    margin-bottom:0.5rem;
    font-weight:300;
  }
  .card-artist {
    font-size:0.82rem;
    color:var(--muted);
    display:flex; align-items:center; gap:0.4rem;
  }
  .card-artist::before {
    content:''; width:18px; height:1px;
    background:var(--accent2); opacity:0.6;
  }
  .card-play-hint {
    position:absolute;
    top:0.8rem; right:0.8rem;
    background:rgba(192,132,252,0.15);
    border:1px solid rgba(192,132,252,0.3);
    backdrop-filter:blur(8px);
    border-radius:999px;
    padding:0.25rem 0.7rem;
    font-size:0.7rem;
    color:var(--accent1);
    opacity:0;
    transition:opacity 0.2s;
  }
  .song-card:hover .card-play-hint { opacity:1; }

  /* Footer */
  footer {
    position:relative; z-index:1;
    text-align:center;
    padding:1rem;
    color:var(--muted);
    font-size:0.7rem;
    letter-spacing:0.15em;
    opacity:0.5;
  }

  /* Floating sakura petals */
  .petal {
    position:fixed;
    width:8px; height:8px;
    border-radius:0 50% 50% 50%;
    background:rgba(244,114,182,0.3);
    pointer-events:none;
    animation:fall linear infinite;
    z-index:0;
  }
  @keyframes fall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:0.8; }
    100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-kanji">もちご · karaoke</div>
  <div class="logo-title">MochiGo</div>
  <div class="logo-sub">Karaoke · 日本語</div>
  <div class="deco-line"><span>✦ selecciona una canción ✦</span></div>
</header>

<div class="songs-grid">

  <!-- Vivarium -->
  <a class="song-card" href="vivarium/index.html">
    <div class="card-play-hint">▶ Play</div>
    <div class="card-cover-fallback" style="--grad:linear-gradient(135deg,#2d1b4e,#4a1942,#1a1535)">
      <span>🫧</span>
    </div>
    <div class="card-body">
      <div class="card-anime">Single 2026</div>
      <div class="card-title">Vivarium</div>
      <div class="card-title-jp">ビバリウム</div>
      <div class="card-artist">Ado</div>
    </div>
  </a>

  <!-- Qué Dolor -->
  <a class="song-card" href="que-dolor/index.html">
    <div class="card-play-hint">▶ Play</div>
    <div class="card-cover-fallback" style="--grad:linear-gradient(135deg,#1e3a5f,#2d1b4e,#0f1a2e)">
      <span>💙</span>
    </div>
    <div class="card-body">
      <div class="card-anime">Ao no Hako · Hina</div>
      <div class="card-title">Qué Dolor</div>
      <div class="card-title-jp">何という痛み</div>
      <div class="card-artist">Nyako</div>
    </div>
  </a>

  <!-- Ano Yume wo Nazotte -->
  <a class="song-card" href="ano-yume/index.html">
    <div class="card-play-hint">▶ Play</div>
    <div class="card-cover-fallback" style="--grad:linear-gradient(135deg,#1a3a2e,#2d4a1e,#0f2a1e)">
      <span>🎆</span>
    </div>
    <div class="card-body">
      <div class="card-anime">YOASOBI</div>
      <div class="card-title">Tracing that Dream</div>
      <div class="card-title-jp">あの夢をなぞって</div>
      <div class="card-artist">YOASOBI</div>
    </div>
  </a>

</div>

<footer>MochiGo Karaoke · Barranquilla 🇨🇴 · 2026</footer>

<script>
// Sakura petals
for (let i = 0; i < 12; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.cssText = `
    left:${Math.random()*100}%;
    animation-duration:${6+Math.random()*10}s;
    animation-delay:${Math.random()*8}s;
    width:${5+Math.random()*6}px;
    height:${5+Math.random()*6}px;
    opacity:${0.2+Math.random()*0.4};
    transform:rotate(${Math.random()*360}deg);
  `;
  document.body.appendChild(p);
}
</script>
</body>
</html>
