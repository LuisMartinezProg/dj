<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎌 Música</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#09070f">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">

<style>
:root{--bg:#09070f;--card:#1a1230;--accent1:#c084fc;--accent2:#f472b6;--accent3:#818cf8;--text:#f1e9ff;--muted:#6b5e8c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
.songs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:960px;margin:1.5rem auto;padding:0 1.5rem}
.song-card{background:var(--card);border-radius:18px;overflow:hidden;display:block;text-decoration:none;color:inherit}
.card-cover{width:100%;aspect-ratio:1/1;object-fit:cover}
.hidden{display:none}
</style>
</head>

<body>

<input id="searchInput" placeholder="Buscar..." style="margin:1rem;padding:0.5rem;width:90%">
<div id="searchCount"></div>

<div class="songs-grid" id="songsGrid">

<!-- Vivarium -->
<a class="song-card" href="vivarium.html" data-s="vivarium ado">
<img class="card-cover" src="vivarium-cover.jpg">
</a>

<!-- Eien -->
<a class="song-card" href="eien.html" data-s="eien ado">
<img class="card-cover" src="E-p.png" onerror="this.src='Eien.jpg'">
</a>

<!-- Jane -->
<a class="song-card" href="jane.html" data-s="jane">
<img class="card-cover" src="Jane-imagen.png">
</a>

<!-- Hikaru -->
<a class="song-card" href="hikaru.html" data-s="hikaru">
<img class="card-cover" src="H-p.png">
</a>

<!-- Ano -->
<a class="song-card" href="anoyume.html" data-s="ano">
<img class="card-cover" src="A-p.png">
</a>

<!-- Usseewa -->
<a class="song-card" href="usseewa.html" data-s="usseewa">
<img class="card-cover" src="U-p.png">
</a>

<!-- Odo -->
<a class="song-card" href="odo.html" data-s="odo">
<img class="card-cover" src="O-p.png">
</a>

<!-- Aishite -->
<a class="song-card" href="aishite.html" data-s="aishite">
<img class="card-cover" src="Ai-p.png">
</a>

<!-- Ashura -->
<a class="song-card" href="ashura.html" data-s="ashura">
<img class="card-cover" src="As-p.png">
</a>

<!-- Senbonzakura -->
<a class="song-card" href="senbonzakura.html" data-s="senbonzakura">
<img class="card-cover" src="Se-p.png">
</a>

<!-- Himawari -->
<a class="song-card" href="himawari.html" data-s="himawari">
<img class="card-cover" src="Hi-p.png">
</a>

<!-- Crime -->
<a class="song-card" href="crime.html" data-s="crime">
<img class="card-cover" src="C-p.png">
</a>

<!-- Kiss -->
<a class="song-card" href="kisskiss.html" data-s="kiss">
<img class="card-cover" src="K-p.jpeg">
</a>

<!-- Ready -->
<a class="song-card" href="readysteady.html" data-s="ready">
<img class="card-cover" src="R-p.png">
</a>

<!-- Aitakute -->
<a class="song-card" href="aitakute.html" data-s="aitakute">
<img class="card-cover" src="Ait-p.png">
</a>

<!-- Bouquet -->
<a class="song-card" href="bouquet.html" data-s="bouquet">
<img class="card-cover" src="Bo-p.png">
</a>

<!-- Dignity -->
<a class="song-card" href="dignity.html" data-s="dignity">
<img class="card-cover" src="Di-p.png">
</a>

<!-- Zero -->
<a class="song-card" href="zero.html" data-s="zero">
<img class="card-cover" src="0-p.png">
</a>

</div>

<script>
const searchInput=document.getElementById('searchInput');
const searchCount=document.getElementById('searchCount');
const cards=document.querySelectorAll('.song-card');
const total=cards.length;

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase();
  let vis=0;
  cards.forEach(c=>{
    const ok=c.dataset.s.includes(q);
    c.classList.toggle('hidden',!ok);
    if(ok)vis++;
  });
  searchCount.textContent=q?`${vis} de ${total}`:'';
});
</script>

</body>
