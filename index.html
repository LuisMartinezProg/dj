<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あの夢をなぞって · YOASOBI — MochiGo Karaoke</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#09070f;--card:#1a1230;--accent1:#c084fc;--accent2:#f472b6;--accent3:#818cf8;--text:#f1e9ff;--muted:#6b5e8c;--glow:rgba(192,132,252,0.3)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(192,132,252,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(244,114,182,0.07) 0%,transparent 60%);z-index:0;pointer-events:none}
  .back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(26,18,48,0.8);border:1px solid rgba(192,132,252,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
  .back-btn:hover{background:rgba(192,132,252,0.15)}
  header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(192,132,252,0.15)}
  .song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem}
  .artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
  .visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
  .bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent2),var(--accent1));opacity:0.4;height:4px}
  @keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
  .playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
  audio{display:none}
  .progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
  .progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
  .time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif;letter-spacing:0.05em}
  .controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 1rem;flex-wrap:wrap}
  .btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
  .btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
  .btn-primary:hover{transform:scale(1.05);box-shadow:0 0 35px var(--glow)}
  .btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(192,132,252,0.3);padding:0.75rem 1.3rem;font-size:0.9rem}
  .btn-secondary:hover{background:rgba(192,132,252,0.1)}
  .volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.8rem;position:relative;z-index:1}
  .volume-row span{color:var(--muted);font-size:0.8rem}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
  .view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
  .toggle-btn{border:1px solid rgba(192,132,252,0.25);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s;letter-spacing:0.05em}
  .toggle-btn:hover,.toggle-btn.active{background:rgba(192,132,252,0.12);border-color:var(--accent1);color:var(--accent1)}
  .lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 8rem}
  .lyric-block{padding:1.2rem 1.6rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.3}
  .lyric-block:hover{opacity:0.55;background:rgba(192,132,252,0.04)}
  .lyric-block.past{opacity:0.18}
  .lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(192,132,252,0.08),rgba(244,114,182,0.06));border-color:rgba(192,132,252,0.3);box-shadow:0 0 30px rgba(192,132,252,0.1),inset 0 0 20px rgba(192,132,252,0.03);transform:translateX(6px)}
  .lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.35rem;transition:all 0.4s}
  .lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.88rem,2vw,1.05rem);color:var(--accent1);opacity:0.85;margin-bottom:0.25rem;letter-spacing:0.03em}
  .lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.75rem,1.5vw,0.88rem);color:var(--muted);font-weight:300;letter-spacing:0.08em}
  body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
  body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
  .now-pill{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(192,132,252,0.85),rgba(244,114,182,0.85));color:white;padding:0.45rem 1.3rem;border-radius:999px;font-size:0.75rem;letter-spacing:0.1em;backdrop-filter:blur(10px);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap}
  body.is-playing .now-pill{opacity:1}
  @keyframes pulse-pill{0%,100%{box-shadow:0 0 12px rgba(192,132,252,0.5)}50%{box-shadow:0 0 28px rgba(192,132,252,0.9)}}
  body.is-playing .now-pill{animation:pulse-pill 2s ease-in-out infinite}
  .audio-error{display:none;position:relative;z-index:1;margin:0.5rem 2rem;padding:0.8rem 1.2rem;background:rgba(244,114,182,0.12);border:1px solid rgba(244,114,182,0.3);border-radius:12px;color:var(--accent2);font-size:0.82rem;text-align:center;line-height:1.5}
  .audio-error.show{display:block}
</style>
</head>
