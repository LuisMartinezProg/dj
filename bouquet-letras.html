<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしに花束を · Bouquet for Me — Ado</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e04;--card:#1c1a06;--accent1:#f5c842;--accent2:#ffea80;--accent3:#c87800;--text:#fff8e0;--muted:#5a4a10;--glow:rgba(245,200,66,0.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 15%,rgba(245,200,66,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 85%,rgba(30,100,200,0.06) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(15,14,4,0.88);border:1px solid rgba(245,200,66,0.25);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}

@media(orientation:landscape){
  body{display:grid;grid-template-rows:auto 1fr;padding-bottom:0}
  .top-section{grid-row:1;display:flex;align-items:center;gap:1rem;padding:0.6rem 1.2rem;border-bottom:1px solid rgba(245,200,66,0.1);background:var(--bg);position:sticky;top:0;z-index:50}
  .landscape-layout{grid-row:2;display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 110px)}
  .controls-panel{padding:1rem;display:flex;flex-direction:column;gap:0.6rem;border-right:1px solid rgba(245,200,66,0.1);overflow-y:auto}
  .lyrics-panel{overflow-y:auto;padding:0.5rem 1rem}
  .progress-section,.controls,.volume-row,.view-toggles{padding:0.4rem 0}
  .back-btn{display:none}
  .scroll-btn{bottom:1rem;right:1rem}
}
@media(orientation:portrait){
  .top-section{display:none}
  .landscape-layout{display:contents}
  .controls-panel{display:contents}
  .lyrics-panel{display:contents}
}

header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(245,200,66,0.1)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.85rem;font-weight:300;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:44px;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.35;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:5px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:#0f0e04;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(245,200,66,0.25);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(245,200,66,0.2);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(245,200,66,0.1);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.62rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;display:flex;align-items:center;gap:0.8rem;opacity:0.5}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(245,200,66,0.12)}
.lyric-block{padding:1rem 1.4rem;margin-bottom:0.4rem;border-radius:12px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.28}
.lyric-block.past{opacity:0.14}
.lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(200,120,0,0.15),rgba(245,200,66,0.07));border-color:rgba(245,200,66,0.35);box-shadow:0 0 28px rgba(245,200,66,0.1);transform:translateX(5px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.8vw,1.65rem);font-weight:400;color:var(--text);line-height:1.35;margin-bottom:0.3rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.9rem,2.2vw,1.1rem);color:var(--accent1);opacity:0.75;margin-bottom:0.25rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.85rem,1.9vw,1rem);color:var(--accent2);opacity:0.55;font-weight:300;letter-spacing:0.06em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;opacity:0.45;color:#0f0e04}
.scroll-btn:hover{transform:scale(1.1);opacity:1}
.scroll-btn.active{opacity:1}
.top-section .song-info .t{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--accent2);letter-spacing:0.05em}
.top-section .song-info .a{font-size:0.7rem;color:var(--muted);letter-spacing:0.2em}
.top-section .mini-viz{display:flex;align-items:flex-end;gap:2px;height:28px}
.top-section .mini-viz .bar{width:3px}
</style>
</head>
<body>
<a class="back-btn" href="bouquet.html">← Volver</a>
<audio id="audio" src="Bo-m.mp3" preload="auto"></audio>

<div class="top-section">
  <div class="song-info" style="flex:1"><div class="t">わたしに花束を · Bouquet for Me</div><div class="a">ADO · 2024</div></div>
  <div class="mini-viz playing" id="miniViz"></div>
</div>

<div class="landscape-layout">
<div class="controls-panel">
  <header>
    <div class="song-title">わたしに花束を</div>
    <div class="artist-name">Ado · Bouquet for Me</div>
    <div class="visualizer-wrap playing" id="visualizer"></div>
  </header>
  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-row"><span id="timeNow">0:00</span><span id="timeTotal">—</span></div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="playBtn">▶ Play</button>
    <button class="btn btn-secondary" id="resetBtn">↩</button>
  </div>
  <div class="volume-row">
    <span>🔈</span><input type="range" id="vol" min="0" max="1" step="0.05" value="0.8"><span>🔊</span>
  </div>
  <div class="view-toggles">
    <button class="toggle-btn active" data-view="all">Todo</button>
    <button class="toggle-btn" data-view="es">ES</button>
    <button class="toggle-btn" data-view="romaji">ROM</button>
    <button class="toggle-btn" data-view="kanji">JP</button>
  </div>
</div>
<div class="lyrics-panel">
  <div class="lyrics-container" id="lyricsContainer"></div>
</div>
</div>
<button class="scroll-btn" id="scrollBtn">♪</button>

<script>
const LYRICS = [
  {t:0.92,  section:"Intro",    es:"Las palabras de gracias",                                                  ro:"Arigatou no kotoba ga",                                  kj:"ありがとうの言葉が"},
  {t:3.42,  section:"Intro",    es:"El ayer de los lo sientos",                                                ro:"Gomen nasai no kinou ga",                                kj:"ごめんなさいの昨日が"},
  {t:6.18,  section:"Intro",    es:"Van conectando el hoy y el mañana",                                        ro:"Kyou to ashita wo tsunaide iku",                         kj:"今日と明日を繋いでいく"},
  {t:24.38, section:"Verso 1",  es:"Seguramente yo soy «una más entre todos»",                                 ro:"Kitto watashi tte sono ta taisuu",                       kj:"きっと私って「その他大勢」"},
  {t:28.50, section:"Verso 1",  es:"Siempre suspirando",                                                       ro:"Tameiki bakari shite",                                   kj:"ため息ばかりして"},
  {t:31.40, section:"Verso 1",  es:"La felicidad se escapa",                                                   ro:"Shiawase nigechau",                                      kj:"幸せ逃げちゃう"},
  {t:34.56, section:"Verso 1",  es:"Lo trago de golpe",                                                        ro:"Sutto nomikonde",                                        kj:"スッと飲み込んで"},
  {t:36.53, section:"Verso 1",  es:"Me lleno de azúcar",                                                       ro:"Toubun totte",                                           kj:"糖分取って"},
  {t:38.86, section:"Verso 1",  es:"Una pequeña recompensa también es necesaria, ¿no?",                        ro:"Chotto no gohoubi mo hitsuyou deshou",                    kj:"ちょっとのご褒美も必要でしょう？"},
  {t:44.62, section:"Coro 1",   es:"Un día de valentía",                                                       ro:"Yuuki aru ichinichi wo",                                 kj:"勇気ある一日を"},
  {t:49.45, section:"Coro 1",   es:"Celebrémoslo — un ramo de flores para mí",                                 ro:"Shukufuku shiyou, watashi ni hanataba wo",               kj:"祝福しよう 私に花束を"},
  {t:56.15, section:"Coro 1",   es:"Las palabras de gracias",                                                  ro:"Arigatou no kotoba ga",                                  kj:"ありがとうの言葉が"},
  {t:58.78, section:"Coro 1",   es:"El ayer de los lo sientos",                                                ro:"Gomen nasai no kinou ga",                                kj:"ごめんなさいの昨日が"},
  {t:61.27, section:"Coro 1",   es:"Me están haciendo la yo de hoy",                                           ro:"Kyou no watashi wo tsukutteru",                          kj:"今日の私を作ってる"},
  {t:66.46, section:"Coro 1",   es:"Con una sonrisa de felicitaciones",                                        ro:"Omedetou tte egao de",                                   kj:"おめでとうって笑顔で"},
  {t:69.07, section:"Coro 1",   es:"Con lágrimas de «qué frustrante»",                                         ro:"Kuyashii na tte namida de",                              kj:"悔しいなって涙で"},
  {t:71.56, section:"Coro 1",   es:"¿Qué yo voy a crear mañana?",                                              ro:"Ashita wa donna watashi wo tsukurou",                    kj:"明日はどんな私を作ろう"},
  {t:88.42, section:"Verso 2",  es:"All right, que me esfuerce cuando ya me estoy esforzando",                 ro:"All right, ganbarre tte mou ganbatteru",                 kj:"All right 頑張れってもう頑張ってる"},
  {t:92.71, section:"Verso 2",  es:"Las palabras positivas",                                                   ro:"Pojitiibu na kotoba ga",                                 kj:"ポジティブな言葉が"},
  {t:95.65, section:"Verso 2",  es:"También hay días en que las odio",                                         ro:"Kirai na hi mo aru (haa)",                               kj:"嫌いな日もある（はぁ）"},
  {t:98.94, section:"Verso 2",  es:"Saco la lengua — frustración",                                             ro:"Bee tte shita wo dasu, furasutrêshon",                   kj:"べーって舌を出す フラストレーション"},
  {t:102.95,section:"Verso 2",  es:"Cambio de chip, deslizo, no hago replay",                                  ro:"Kirikaeite suwaipo, rîpurei shinai",                     kj:"切り替えてスワイプ リプレイしない"},
  {t:108.72,section:"Verso 2",  es:"La lluvia para y alumbra",                                                 ro:"Ame wa yami terashidasu",                                kj:"雨は止み照らし出す"},
  {t:113.58,section:"Coro 2",   es:"Un aliento también para ti, que vives el presente",                        ro:"Ima wo ikiru anata ni mo êru wo",                        kj:"今を生きる あなたにもエールを"},
  {t:120.23,section:"Coro 2",   es:"La debilidad de querer escapar",                                           ro:"Nige dashitai tte yowasa to",                            kj:"逃げ出したいって弱さと"},
  {t:122.88,section:"Coro 2",   es:"Y el latido de querer lograrlo",                                           ro:"Kanaetai tte kodou ga",                                  kj:"叶えたいって鼓動が"},
  {t:125.45,section:"Coro 2",   es:"Batallan sin cesar en el corazón",                                         ro:"Taezu kokoro de tatakau",                                kj:"絶えず心で戦う"},
  {t:130.53,section:"Coro 2",   es:"El sentimiento de «ya está bien»",                                         ro:"Mou ii ya tte kimochi mo",                               kj:"もういいやって気持ちも"},
  {t:133.17,section:"Coro 2",   es:"El deseo de «reconóceme»",                                                 ro:"Mitomete yo tte negai mo",                               kj:"認めてよって願いも"},
  {t:135.77,section:"Coro 2",   es:"Todos las tocan, lloran y siguen viviendo",                                ro:"Dare mo ga furete naite wa ikiru",                       kj:"誰もが触れて泣いては生きる"},
  {t:144.05,section:"Puente",   es:"Aunque soy una existencia pequeña",                                        ro:"Chippoke na sonzai dakedo",                              kj:"ちっぽけな存在だけど"},
  {t:148.36,section:"Puente",   es:"Quiero ser la luz de alguien",                                             ro:"Dareka wo tomoshite itai",                               kj:"誰かを灯していたい"},
  {t:162.67,section:"Clímax",   es:"Me derrumbo diciendo que ya es demasiado",                                 ro:"Mou takusan tte koboshite",                              kj:"もう沢山って零して"},
  {t:165.25,section:"Clímax",   es:"Me rompo diciendo que ya llegué al límite",                                ro:"Genkai da tte kowarete",                                 kj:"限界だって壊れて"},
  {t:167.76,section:"Clímax",   es:"Aun así, el amor no puede apagarse",                                       ro:"Sore demo ai wa kesenai",                                kj:"それでも愛は消せない"},
  {t:172.82,section:"Clímax",   es:"Me repito «todo está bien»",                                               ro:"Daijoubu tte tonaete",                                   kj:"大丈夫って唱えて"},
  {t:175.49,section:"Clímax",   es:"Me río diciendo «a la porra»",                                             ro:"Fuzakenna tte waratte",                                  kj:"ふざけんなって笑って"},
  {t:178.13,section:"Clímax",   es:"Me vuelvo un poco más fuerte",                                             ro:"Mata hitotsu dake tsuyoku naru",                         kj:"また一つだけ強くなる"},
  {t:183.15,section:"Coro Final",es:"Las palabras de gracias",                                                 ro:"Arigatou no kotoba ga",                                  kj:"ありがとうの言葉が"},
  {t:185.74,section:"Coro Final",es:"El ayer de los lo sientos",                                               ro:"Gomen nasai no kinou ga",                                kj:"ごめんなさいの昨日が"},
  {t:188.38,section:"Coro Final",es:"Me están haciendo la yo de hoy",                                          ro:"Kyou no watashi wo tsukutteru",                          kj:"今日の私を作ってる"},
  {t:193.43,section:"Coro Final",es:"Con una sonrisa de felicitaciones",                                       ro:"Omedetou tte egao de",                                   kj:"おめでとうって笑顔で"},
  {t:196.02,section:"Coro Final",es:"Con lágrimas de «qué frustrante»",                                        ro:"Kuyashii na tte namida de",                              kj:"悔しいなって涙で"},
  {t:198.54,section:"Coro Final",es:"¿Qué yo voy a crear mañana?",                                             ro:"Ashita wa donna watashi wo tsukurou",                    kj:"明日はどんな私を作ろう"},
  {t:208.80,section:"Outro",    es:"La, la, la, la, la",                                                       ro:"Ra ra ra ra ra",                                         kj:"ラ・ラ・ラ・ラ・ラ"},
];

(function(){
  const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),scrollBtn=document.getElementById('scrollBtn');
  let activeIdx=-1;
  const container=document.getElementById('lyricsContainer');
  let cur=null;
  LYRICS.forEach((line,i)=>{
    if(line.section!==cur){cur=line.section;const sl=document.createElement('div');sl.className='section-label';sl.innerHTML=`<span>${line.section}</span>`;container.appendChild(sl);}
    const b=document.createElement('div');b.className='lyric-block';
    b.innerHTML=`<div class="lyric-es">${line.es}</div><div class="lyric-romaji">${line.ro}</div><div class="lyric-kanji">${line.kj}</div>`;
    b.addEventListener('click',()=>{audio.currentTime=line.t;});
    container.appendChild(b);
  });
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const blocks=()=>document.querySelectorAll('.lyric-block');
  function updateActive(t){
    document.getElementById('progressFill').style.width=(audio.duration?(t/audio.duration*100):0)+'%';
    document.getElementById('timeNow').textContent=fmt(t);
    let n=-1;for(let i=0;i<LYRICS.length;i++){if(t>=LYRICS[i].t)n=i;}
    if(n===activeIdx)return;
    activeIdx=n;
    blocks().forEach((b,i)=>{b.classList.toggle('active',i===activeIdx);b.classList.toggle('past',i<activeIdx);});
    scrollBtn.classList.toggle('active',activeIdx>=0);
    const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  }
  audio.addEventListener('loadedmetadata',()=>{document.getElementById('timeTotal').textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',()=>updateActive(audio.currentTime));
  audio.addEventListener('ended',()=>{document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');playBtn.textContent='▶ Play';scrollBtn.classList.remove('active');});
  document.getElementById('progressBar').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);});
  playBtn.addEventListener('click',()=>{
    if(audio.paused){audio.play();playBtn.textContent='⏸ Pausa';document.body.classList.add('is-playing');document.getElementById('visualizer').classList.add('playing');}
    else{audio.pause();playBtn.textContent='▶ Play';document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');}
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    audio.pause();audio.currentTime=0;activeIdx=-1;playBtn.textContent='▶ Play';
    document.body.classList.remove('is-playing');document.getElementById('visualizer').classList.remove('playing');
    blocks().forEach(b=>b.classList.remove('active','past'));scrollBtn.classList.remove('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('vol').addEventListener('input',e=>{audio.volume=parseFloat(e.target.value);});audio.volume=0.8;
  scrollBtn.addEventListener('click',()=>{const el=blocks()[activeIdx];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});});
  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      const v=btn.dataset.view;document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all')document.body.classList.add('view-'+v);if(!audio.paused)document.body.classList.add('is-playing');
    });
  });
  ['visualizer','miniViz'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    for(let i=0;i<(id==='miniViz'?24:48);i++){const bar=document.createElement('div');bar.className='bar';const mh=6+Math.sin(i*0.4)*16+Math.random()*12;bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;el.appendChild(bar);}
  });
})();
</script>
</body>
</html>
