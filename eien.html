<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永遠 · Eien — Musci</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#020d12;--card:#061820;--accent1:#00d4e8;--accent2:#a8f0ff;--accent3:#006080;--text:#e8faff;--muted:#2a6070;--glow:rgba(0,212,232,0.35)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,150,180,0.18) 0%,transparent 70%);z-index:0;pointer-events:none}
  .back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(7,4,16,0.85);border:1px solid rgba(0,212,232,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
  .back-btn:hover{border-color:var(--accent1);background:rgba(180,143,255,0.1)}
  .container{position:relative;z-index:1;max-width:860px;width:100%;display:flex;flex-direction:column;align-items:center;gap:2rem}
  .title-block{text-align:center}
  .song-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.1em;margin-bottom:0.3rem}
  .song-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,3vw,1.4rem);color:var(--accent2);opacity:0.7;letter-spacing:0.2em;margin-bottom:0.4rem}
  .artist-line{color:var(--muted);font-size:0.85rem;letter-spacing:0.3em;text-transform:uppercase}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;width:100%}
  @media(max-width:560px){.panels{grid-template-columns:1fr}}
  .panel{border-radius:20px;overflow:hidden;border:1px solid rgba(0,212,232,0.2);background:var(--card);transition:all 0.3s;text-decoration:none;display:block;position:relative}
  .panel:hover{border-color:var(--accent1);box-shadow:0 0 30px rgba(0,212,232,0.2);transform:translateY(-4px)}
  .panel img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .panel-label{padding:1rem 1.2rem;display:flex;align-items:center;gap:0.6rem;color:var(--accent2);font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic}
  .panel-label .icon{font-size:1.1rem}
  .panel-video iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
  .panel-video .panel-label{color:var(--muted)}
  .download-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .dl-btn{display:flex;align-items:center;gap:0.5rem;padding:0.7rem 1.4rem;border-radius:999px;text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:0.9rem;letter-spacing:0.1em;border:1px solid rgba(0,212,232,0.3);color:var(--accent2);background:rgba(0,212,232,0.08);transition:all 0.2s}
  .dl-btn:hover{background:rgba(0,212,232,0.18);border-color:var(--accent1);transform:translateY(-2px)}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="container">
  <div class="title-block">
    <div class="song-kanji">永遠の明日へ</div>
    <div class="song-romaji">Eien no Akuruhi</div>
    <div class="artist-line">Ado · 2024</div>
  </div>

  <div class="panels">
    <a class="panel" href="eien-letras.html">
      <img src="Eien.jpg" alt="Eien cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;width:100%;aspect-ratio:1;background:linear-gradient(135deg,#020d12,#006080,#00d4e8);align-items:center;justify-content:center;font-size:3rem">💜</div>
      <div class="panel-label"><span class="icon">歌</span> 歌詞 Letras</div>
    </a>
    <div class="panel panel-video">
      <iframe src="https://drive.google.com/file/d/1DK8y9GIbv51xwmQkvXJ9ARSjx31ZCWSl/preview" allowfullscreen allow="autoplay"></iframe>
      <div class="panel-label"><span class="icon">🎬</span> Video</div>
    </div>
  </div>

  <div class="download-btns">
    <a class="dl-btn" href="Eien Music.mp3" download>⬇ Descargar MP3</a>
    <a class="dl-btn" href="https://drive.google.com/uc?export=download&id=1DK8y9GIbv51xwmQkvXJ9ARSjx31ZCWSl">⬇ Descargar Video</a>
  </div>
</div>
</body>
</html>
