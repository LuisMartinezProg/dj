<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビバリウム · Vivarium — Música</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#04060f;--card:#0a0e1a;--accent1:#4f8ef7;--accent2:#a8c8ff;--accent3:#1a3a8f;--text:#f0f4ff;--muted:#4a5578;--glow:rgba(79,142,247,0.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(30,60,180,0.10) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(20,40,140,0.08) 0%,transparent 60%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(4,6,15,0.85);border:1px solid rgba(79,142,247,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(79,142,247,0.15)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.4;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:white;padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(79,142,247,0.3);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(79,142,247,0.25);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(79,142,247,0.12);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;display:flex;align-items:center;gap:0.8rem}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(79,142,247,0.15)}
.lyric-block{padding:1.2rem 1.6rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.3}
.lyric-block.past{opacity:0.18}
.lyric-block.active{opacity:1;background:linear-gradient(135deg,rgba(30,60,180,0.12),rgba(79,142,247,0.07));border-color:rgba(79,142,247,0.35);box-shadow:0 0 30px rgba(50,100,220,0.15);transform:translateX(6px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.35rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.5vw,1.25rem);color:var(--accent2);opacity:1;margin-bottom:0.3rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.95rem,2vw,1.1rem);color:var(--accent2);opacity:0.75;font-weight:400;letter-spacing:0.08em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.audio-error{display:none;position:relative;z-index:1;margin:0.5rem 2rem;padding:0.8rem 1.2rem;background:rgba(79,142,247,0.12);border:1px solid rgba(79,142,247,0.3);border-radius:12px;color:var(--accent2);font-size:0.82rem;text-align:center}
.audio-error.show{display:block}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;opacity:0.5}
.scroll-btn:hover{transform:scale(1.1);opacity:1}
.scroll-btn.active{opacity:1}
</style>
</head>

<a class="back-btn" href="vivarium.html">← Volver</a>
<audio id="audio" src="vivarium.mp3" preload="auto"></audio>

<header>
  <div class="song-title">ビバリウム · Vivarium</div>

<div class="audio-error" id="audioError">⚠️ Falta el archivo <strong>vivarium.mp3</strong></div>

<div class="progress-section">

  <div class="time-row"><span id="timeNow">0:00</span><span id="timeTotal">—</span></div>

<div class="controls">

(function(){
  const audio   = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const scrollBtn = document.getElementById('scrollBtn');
  let activeIdx = -1;

  // ── Construir letras ──────────────────────────────────────────────────────
  const container = document.getElementById('lyricsContainer');
  let curSection = null;
  LYRICS.forEach((line, i) => {
    if(line.section !== curSection){
      curSection = line.section;
      const sl = document.createElement('div');
      sl.className = 'section-label';
      sl.innerHTML = `<span>${line.section}</span>`;
      container.appendChild(sl);
    }
    const b = document.createElement('div');
    b.className = 'lyric-block';
    b.innerHTML =
      `<div class="lyric-es">${line.es}</div>` +
      `<div class="lyric-romaji">${line.ro}</div>` +
      `<div class="lyric-kanji">${line.kj}</div>`;
    b.addEventListener('click', () => { audio.currentTime = line.t; });
    container.appendChild(b);
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const blocks = () => document.querySelectorAll('.lyric-block');

  function updateActive(t){
    document.getElementById('progressFill').style.width =
      (audio.duration ? (t / audio.duration * 100) : 0) + '%';
    document.getElementById('timeNow').textContent = fmt(t);

    let newActive = -1;
    for(let i = 0; i < LYRICS.length; i++){
      if(t >= LYRICS[i].t) newActive = i;
    }
    if(newActive === activeIdx) return;

    activeIdx = newActive;
    blocks().forEach((b, i) => {
      b.classList.toggle('active', i === activeIdx);
      b.classList.toggle('past',   i < activeIdx);
    });
    scrollBtn.classList.toggle('active', activeIdx >= 0);
    const el = blocks()[activeIdx];
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }

  // ── Eventos de audio ──────────────────────────────────────────────────────
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('timeTotal').textContent = fmt(audio.duration);
  });
  audio.addEventListener('error', () => {
    document.getElementById('audioError').classList.add('show');
  });
  audio.addEventListener('timeupdate', () => updateActive(audio.currentTime));
  audio.addEventListener('ended', () => {
    document.body.classList.remove('is-playing');
    document.getElementById('visualizer').classList.remove('playing');
    playBtn.textContent = '▶ Play';
    scrollBtn.classList.remove('active');
  });

  // ── Barra de progreso ─────────────────────────────────────────────────────
  document.getElementById('progressBar').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
  });

  // ── Play / Pausa ──────────────────────────────────────────────────────────
  playBtn.addEventListener('click', () => {
    if(audio.paused){
      audio.play();
      playBtn.textContent = '⏸ Pausa';
      document.body.classList.add('is-playing');
      document.getElementById('visualizer').classList.add('playing');
    } else {
      audio.pause();
      playBtn.textContent = '▶ Play';
      document.body.classList.remove('is-playing');
      document.getElementById('visualizer').classList.remove('playing');
    }
  });

  // ── Reinicio ──────────────────────────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', () => {
    audio.pause(); audio.currentTime = 0; activeIdx = -1;
    playBtn.textContent = '▶ Play';
    document.body.classList.remove('is-playing');
    document.getElementById('visualizer').classList.remove('playing');
    blocks().forEach(b => b.classList.remove('active','past'));
    scrollBtn.classList.remove('active');
    window.scrollTo({top:0, behavior:'smooth'});
  });

  // ── Volumen ───────────────────────────────────────────────────────────────
  document.getElementById('vol').addEventListener('input', e => {
    audio.volume = parseFloat(e.target.value);
  });
  audio.volume = 0.8;

  // ── Botón ir a línea activa ───────────────────────────────────────────────
  scrollBtn.addEventListener('click', () => {
    const el = blocks()[activeIdx];
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  });

  // ── Toggles de vista ──────────────────────────────────────────────────────
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const v = btn.dataset.view;
      document.body.className = document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v !== 'all') document.body.classList.add('view-' + v);
      if(!audio.paused) document.body.classList.add('is-playing');
    });
  });

  // ── Visualizador ──────────────────────────────────────────────────────────
  const vizEl = document.getElementById('visualizer');
  for(let i = 0; i < 48; i++){
    const bar = document.createElement('div');
    bar.className = 'bar';
    const mh = 8 + Math.sin(i*0.4)*22 + Math.random()*16;
    bar.style.cssText = `--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/48)*-1.2}s;`;
    vizEl.appendChild(bar);
  }
})();
</script>
</body>
</html>
