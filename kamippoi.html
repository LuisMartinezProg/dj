<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神っぽいな · Kamippoi Na — Música</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0606;
  --card: #120a0a;
  --card2: #1a0c0c;
  --accent: #cc1111;
  --accent2: #ff4444;
  --text: #f0e8e8;
  --muted: #5a3030;
  --border: rgba(204,17,17,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(180,10,10,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 10% 90%, rgba(100,0,0,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.back-btn {
  position: fixed; top:1rem; left:1rem; z-index:100;
  background: rgba(10,6,6,0.88);
  border: 1px solid var(--border);
  color: var(--accent2);
  padding: 0.5rem 1rem; border-radius: 999px;
  text-decoration: none; font-size: 0.78rem;
  backdrop-filter: blur(10px); transition: all 0.2s; letter-spacing:0.05em;
}
.back-btn:hover { background: rgba(204,17,17,0.12); }

/* ── TÍTULO ── */
.title-banner {
  position: relative; z-index:1;
  text-align: center; padding: 4.5rem 2rem 2.5rem;
}
.title-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(2.8rem,9vw,5.5rem); font-weight:700;
  letter-spacing: 0.14em;
  background: linear-gradient(135deg, #ffffff 0%, #ffaaaa 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.1; margin-bottom: 0.55rem;
}
.title-romaji {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(1rem,3vw,1.45rem); color: #ffaaaa; opacity:0.7;
  letter-spacing: 0.35em; margin-bottom: 0.4rem;
}
.title-artist { font-size:0.72rem; color:var(--muted); letter-spacing:0.45em; text-transform:uppercase; }
.title-line { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); margin:1.3rem auto 0; }

/* ── LAYOUT PRINCIPAL ── */
.main-wrap {
  position:relative; z-index:1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 1.2rem 1rem;
}
@media(min-width:768px){
  .main-wrap { max-width: 420px; }
}

/* ── PANELES ── */
.panels-wrap {
  display:grid; grid-template-columns:1fr 1fr; gap:1rem;
}
@media(max-width:500px) {
  .panels-wrap { grid-template-columns:1fr; gap:0.75rem; }
}

.panel {
  display:flex; flex-direction:column; border-radius:18px; overflow:hidden;
  border:1px solid var(--border); background:var(--card);
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
  transition:transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}
.panel:hover { transform:translateY(-4px); box-shadow:0 16px 48px rgba(180,10,10,0.2); border-color:rgba(204,17,17,0.45); }
.panel-cover { text-decoration:none; color:inherit; }
.panel-img-wrap { width:100%; aspect-ratio:1/1; overflow:hidden; background:var(--card2); position:relative; }
.panel-img { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(0.88) saturate(0.9); transition:filter 0.35s,transform 0.35s; }
.panel-cover:hover .panel-img { filter:brightness(1) saturate(1.05); transform:scale(1.04); }
.panel-img-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(10,6,6,0.5) 0%,transparent 50%); pointer-events:none; }
.panel-video-wrap { width:100%; aspect-ratio:1/1; background:var(--card2); position:relative; overflow:hidden; }
.panel-video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
.panel-label {
  padding:0.7rem 1rem; font-size:0.68rem; letter-spacing:0.28em; text-transform:uppercase;
  color:var(--muted); text-align:center; border-top:1px solid var(--border); background:var(--card2);
  display:flex; align-items:center; justify-content:center; gap:0.45rem; transition:color 0.2s;
}
.panel:hover .panel-label { color:#ffaaaa; }
.panel-label-icon { font-size:0.9rem; }

/* ── INFO SECTION (solo desktop) ── */
.info-section { display:none; }
@media(min-width:768px){
  .info-section{
    display:flex; flex-direction:column; gap:0.5rem;
    margin-top:1.4rem;
    padding:1.1rem 1.3rem;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
  }
  .info-row { display:flex; align-items:baseline; gap:0.6rem; font-size:0.78rem; }
  .info-label {
    font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap; min-width:64px; opacity:0.8;
  }
  .info-value {
    color:#ffaaaa; font-family:'Cormorant Garamond',serif;
    font-size:0.92rem; letter-spacing:0.05em;
  }
  .info-divider { height:1px; background:var(--border); margin:0.2rem 0; }
}

/* ── PALETA ── */
.palette-section { position:relative; z-index:1; max-width:420px; margin:0 auto; padding:0.5rem 1.2rem 3.5rem; }
@media(max-width:768px){ .palette-section{ max-width:480px; } }
.palette-section-label { font-size:0.6rem; letter-spacing:0.38em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:0.65rem; opacity:0.55; }
.palette-bar { display:flex; border-radius:12px; overflow:visible; height:36px; border:1px solid rgba(255,255,255,0.05); box-shadow:0 4px 24px rgba(0,0,0,0.5); }
.swatch { flex:1; position:relative; cursor:default; transition:flex 0.3s ease; }
.swatch:first-child { border-radius:12px 0 0 12px; } .swatch:last-child { border-radius:0 12px 12px 0; }
.swatch:hover { flex:2.2; }
.swatch-tip { display:none; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:rgba(10,6,6,0.95); border:1px solid var(--border); color:var(--text); font-size:0.62rem; padding:0.22rem 0.55rem; border-radius:6px; white-space:nowrap; letter-spacing:0.06em; backdrop-filter:blur(8px); z-index:10; font-family:'Cormorant Garamond',serif; }
.swatch:hover .swatch-tip { display:block; }
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Menú</a>

<div class="title-banner">
  <div class="title-jp">神っぽいな</div>
  <div class="title-romaji">Kamippoi Na</div>
  <div class="title-artist">Ado · 2021</div>
  <div class="title-line"></div>
</div>

<div class="main-wrap">
  <div class="panels-wrap">
    <a class="panel panel-cover" href="kamippoi-letras.html">
      <div class="panel-img-wrap">
        <img class="panel-img" src="Kamippoi.png" alt="神っぽいな · Ado" onerror="this.parentElement.style.background='#1a0c0c'">
        <div class="panel-img-overlay"></div>
      </div>
      <div class="panel-label"><span class="panel-label-icon">歌詞</span> Letras</div>
    </a>
    <div class="panel">
      <div class="panel-video-wrap">
        <iframe src="https://drive.google.com/file/d/1dGKfLT7BdebbLn0UjUlHtKwUu-sg2fk6/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
      <div class="panel-label"><span class="panel-label-icon">🎬</span> Video</div>
    </div>
  </div>

  <!-- Info solo desktop -->
  <div class="info-section">
    <div class="info-row">
      <span class="info-label">Artista</span>
      <span class="info-value">Ado</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-row">
      <span class="info-label">Fecha</span>
      <span class="info-value">2021 · Single</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-row">
      <span class="info-label">Género</span>
      <span class="info-value">J-Pop · Electrónica · Dark Pop</span>
    </div>
  </div>
</div>

<div class="palette-section">
  <div class="palette-section-label">Paleta · Ado</div>
  <div class="palette-bar">
    <div class="swatch" style="background:#0a0606"><span class="swatch-tip">#0a0606</span></div>
    <div class="swatch" style="background:#1a0c0c"><span class="swatch-tip">#1a0c0c</span></div>
    <div class="swatch" style="background:#2d1010"><span class="swatch-tip">#2d1010</span></div>
    <div class="swatch" style="background:#660000"><span class="swatch-tip">#660000</span></div>
    <div class="swatch" style="background:#cc1111"><span class="swatch-tip">#cc1111</span></div>
    <div class="swatch" style="background:#cccccc"><span class="swatch-tip">#cccccc</span></div>
    <div class="swatch" style="background:#e8e0e0"><span class="swatch-tip">#e8e0e0</span></div>
    <div class="swatch" style="background:#ffffff"><span class="swatch-tip">#ffffff</span></div>
  </div>
</div>
</body>
</html>
