<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罪と罰 · Crime and Punishment — Música</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060606;--card:#101010;--accent1:#d8d8d8;--accent2:#ffffff;--accent3:#282828;--text:#f0f0f0;--muted:#505050;--glow:rgba(200,200,200,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 20%,rgba(60,60,60,0.06) 0%,transparent 70%);z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(6,6,6,0.85);border:1px solid rgba(200,200,200,0.2);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
header{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem 1rem;border-bottom:1px solid rgba(200,200,200,0.12)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:600;background:linear-gradient(135deg,#808080,#ffffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;margin-bottom:0.3rem}
.artist-name{color:var(--muted);font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1rem}
.visualizer-wrap{display:flex;justify-content:center;align-items:flex-end;gap:3px;height:50px;padding:0 2rem;margin-top:0.5rem}
.bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent1));opacity:0.4;height:4px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--max-h)}}
.playing .bar{opacity:1;animation:wave var(--spd) ease-in-out infinite;animation-delay:var(--delay)}
audio{display:none}
.progress-section{position:relative;z-index:1;padding:1rem 2rem 0.5rem;max-width:780px;margin:0 auto}
.progress-bar-wrap{width:100%;height:6px;background:var(--card);border-radius:3px;cursor:pointer;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:3px;width:0%;box-shadow:0 0 10px var(--glow);pointer-events:none}
.time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
.controls{position:relative;z-index:1;display:flex;justify-content:center;gap:1rem;padding:0.8rem 2rem 0.5rem;flex-wrap:wrap}
.btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:var(--bg);padding:0.75rem 2rem;font-size:1rem;font-weight:700;box-shadow:0 0 20px var(--glow);min-width:130px;justify-content:center}
.btn-primary:hover{transform:scale(1.05)}
.btn-secondary{background:var(--card);color:var(--accent1);border:1px solid rgba(200,200,200,0.2);padding:0.75rem 1.3rem;font-size:0.9rem}
.volume-row{display:flex;align-items:center;gap:0.6rem;justify-content:center;padding-bottom:0.5rem;position:relative;z-index:1}
.volume-row span{color:var(--muted);font-size:0.8rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--card);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent1);cursor:pointer}
.view-toggles{position:relative;z-index:1;display:flex;justify-content:center;gap:0.5rem;padding:0 2rem 1.2rem;flex-wrap:wrap}
.toggle-btn{border:1px solid rgba(200,200,200,0.18);background:transparent;color:var(--muted);padding:0.35rem 1rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.78rem;transition:all 0.2s}
.toggle-btn.active{background:rgba(200,200,200,0.08);border-color:var(--accent1);color:var(--accent1)}
.lyrics-container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 2rem}
.section-label{text-align:center;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);padding:1.2rem 0 0.5rem;opacity:0.5;display:flex;align-items:center;gap:0.8rem}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(200,200,200,0.10)}
.lyric-block{padding:1.2rem 1.6rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid transparent;transition:all 0.4s ease;cursor:pointer;opacity:0.3}
.lyric-block.past{opacity:0.15}
.lyric-block.active{opacity:1;background:rgba(255,255,255,0.04);border-color:rgba(200,200,200,0.25);box-shadow:0 0 30px rgba(100,100,100,0.12);transform:translateX(6px)}
.lyric-es{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.35rem}
.lyric-block.active .lyric-es{background:linear-gradient(90deg,#c0c0c0,#ffffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lyric-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.5vw,1.25rem);color:var(--accent1);margin-bottom:0.3rem}
.lyric-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(0.95rem,2vw,1.1rem);color:var(--accent1);opacity:0.6;font-weight:400;letter-spacing:0.08em}
body.view-es .lyric-romaji,body.view-es .lyric-kanji{display:none}
body.view-romaji .lyric-es,body.view-romaji .lyric-kanji{display:none}
body.view-kanji .lyric-es,body.view-kanji .lyric-romaji{display:none}
.scroll-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent1));border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--bg);transition:all 0.2s;opacity:0.5}
.scroll-btn:hover{transform:scale(1.1);opacity:1}.scroll-btn.active{opacity:1}

/* ═══ LANDSCAPE ═══ */
.landscape-layout{display:none}
@media(orientation:landscape) and (max-height:600px){
  .back-btn{display:none !important}
  .scroll-btn{display:none !important}
  body{padding-bottom:0;overflow:hidden;height:100dvh}
  header,.header-v,.ctrl-v,.progress-section,.controls,.volume-row,
  .view-toggles,#lyricsContainer,.lyrics-container{display:none !important}
  .landscape-layout{display:flex;height:100dvh;overflow:hidden;position:relative;z-index:1}
  .land-left{
    width:50%;flex-shrink:0;
    display:flex;flex-direction:column;
    padding:0.55rem 0.8rem;
    border-right:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);
    gap:0.3rem;overflow:hidden
  }
  .land-back-btn{
    display:inline-flex;align-items:center;gap:0.3rem;
    text-decoration:none;color:var(--accent1);
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
    border-radius:999px;padding:0.2rem 0.65rem;
    font-size:0.62rem;font-family:'Cormorant Garamond',serif;
    letter-spacing:0.05em;transition:all 0.2s;align-self:flex-start;flex-shrink:0
  }
  .land-back-btn:hover{background:rgba(255,255,255,0.12);border-color:var(--accent1)}
  .land-title{font-family:'Cormorant Garamond',serif;font-size:0.9rem;font-weight:600;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .land-artist{font-size:0.54rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.05rem}
  .land-viz{display:flex;align-items:flex-end;gap:2px;height:22px}
  .land-viz .bar{width:3px}
  .land-progress-wrap{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;cursor:pointer;overflow:hidden}
  .land-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent1),var(--accent2));border-radius:2px;width:0%;pointer-events:none}
  .land-time{display:flex;justify-content:space-between;font-size:0.58rem;color:var(--muted);font-family:'Cormorant Garamond',serif}
  .land-btn-row{display:flex;gap:0.4rem}
  .land-btn{border:none;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.7rem;padding:0.32rem 0.6rem;flex:1;text-align:center;transition:all 0.2s}
  .land-btn-play{background:linear-gradient(135deg,var(--accent3),var(--accent1));color:white;font-weight:700;box-shadow:0 0 10px rgba(255,255,255,0.1)}
  .land-btn-reset{background:rgba(255,255,255,0.06);color:var(--accent1);border:1px solid rgba(255,255,255,0.15)}
  .land-vol-row{display:flex;align-items:center;gap:0.3rem}
  .land-vol-row span{color:var(--muted);font-size:0.62rem}
  .land-vol{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);outline:none;cursor:pointer}
  .land-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent1);cursor:pointer}
  .land-toggles{display:flex;flex-wrap:wrap;gap:0.22rem}
  .land-toggle{border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);padding:0.18rem 0.45rem;border-radius:999px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:0.58rem;transition:all 0.2s}
  .land-toggle.active{background:rgba(255,255,255,0.08);border-color:var(--accent1);color:var(--accent1)}
  .land-nav-row{
    display:flex;gap:0.4rem;
    padding-top:0.3rem;border-top:1px solid rgba(255,255,255,0.08);
    flex-shrink:0;margin-top:auto
  }
  .land-nav-btn{
    display:flex;align-items:center;gap:0;flex:1;
    text-decoration:none;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.10);
    border-radius:8px;overflow:hidden;
    transition:all 0.2s;min-width:0;height:38px
  }
  .land-nav-btn:hover{border-color:var(--accent1);box-shadow:0 0 14px rgba(255,255,255,0.08)}
  .land-nav-btn:hover .land-nav-arrow{background:rgba(255,255,255,0.15);color:var(--accent2)}
  .land-nav-arrow{
    display:flex;align-items:center;justify-content:center;
    width:24px;flex-shrink:0;height:100%;
    background:rgba(255,255,255,0.07);
    color:var(--accent1);font-size:0.85rem;
    border-right:1px solid rgba(255,255,255,0.10);
    transition:all 0.2s
  }
  .land-nav-next .land-nav-arrow{border-right:none;border-left:1px solid rgba(255,255,255,0.10)}
  .land-nav-img{width:38px;height:38px;object-fit:cover;flex-shrink:0;display:block}
  .land-nav-fallback{
    width:38px;height:38px;flex-shrink:0;
    background:rgba(255,255,255,0.06);
    display:none;align-items:center;justify-content:center;
    font-size:1rem;color:var(--muted)
  }
  .land-nav-label{
    display:flex;flex-direction:column;min-width:0;overflow:hidden;
    padding:0 0.3rem;flex:1
  }
  .land-nav-dir{font-size:0.44rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
  .land-nav-name{font-size:0.58rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Cormorant Garamond',serif;font-weight:600}
  .land-nav-next{flex-direction:row-reverse}
  .land-nav-next .land-nav-label{align-items:flex-end;text-align:right}
  .land-right{flex:1;overflow-y:auto;padding:0.5rem 0.8rem 0.5rem 0.7rem;scroll-behavior:smooth}
  .land-right::-webkit-scrollbar{width:2px}
  .land-right::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
  .land-right .section-label{font-size:0.52rem;padding:0.5rem 0 0.25rem;opacity:0.38}
  .land-right .lyric-block{padding:0.38rem 0.6rem;margin-bottom:0.18rem;border-radius:9px}
  .land-right .lyric-es{font-size:0.88rem;margin-bottom:0.12rem;line-height:1.25}
  .land-right .lyric-romaji{font-size:0.72rem;margin-bottom:0.08rem}
  .land-right .lyric-kanji{font-size:0.66rem}
  .land-right .lyric-block.active{transform:translateX(3px)}
}
</style>
</head>

<script>
(function(){
  const audio=document.getElementById('audio');
  if(!audio) return;
  let activeIdx=-1;
  // IDs compatibles con ambos formatos
  const getV = id => document.getElementById(id+'V') || document.getElementById(id==='lyricsV'?'lyricsContainer':id==='playV'?'playBtn':id==='resetV'?'resetBtn':id==='pbV'?'progressBar':id==='pfV'?'progressFill':id==='tnV'?'timeNow':id==='ttV'?'timeTotal':id==='volV'?'vol':id==='vizV'?'visualizer':id);
  const lyricsV = getV('lyricsV');
  const lyricsL = document.getElementById('lyricsL');
  function buildLyrics(container){
    if(!container) return;
    let curSec=null;
    LYRICS.forEach((line,i)=>{
      if(line.section!==curSec){
        curSec=line.section;
        const sl=document.createElement('div');sl.className='section-label';
        sl.innerHTML=`<span>${line.section||''}</span>`;container.appendChild(sl);
      }
      const b=document.createElement('div');b.className='lyric-block';b.dataset.idx=i;
      let h='';
      if(line.es) h+=`<div class="lyric-es">${line.es}</div>`;
      if(line.ro) h+=`<div class="lyric-romaji">${line.ro}</div>`;
      if(line.kj) h+=`<div class="lyric-kanji">${line.kj}</div>`;
      b.innerHTML=h;
      b.addEventListener('click',()=>{audio.currentTime=line.t;});
      container.appendChild(b);
    });
  }
  buildLyrics(lyricsV);
  buildLyrics(lyricsL);
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const scrollBtn=document.getElementById('scrollBtn');
  const pfV=getV('pfV'), pfL=document.getElementById('pfL');
  const tnV=getV('tnV'), tnL=document.getElementById('tnL');
  const ttV=getV('ttV'), ttL=document.getElementById('ttL');
  const pbV=getV('pbV'), pbL=document.getElementById('pbL');
  const playV=getV('playV'), playL=document.getElementById('playL');
  const resetV=getV('resetV'), resetL=document.getElementById('resetL');
  const volV=getV('volV'), volL=document.getElementById('volL');
  function setProgress(t){
    const pct=(audio.duration?(t/audio.duration*100):0)+'%';
    if(pfV) pfV.style.width=pct;
    if(pfL) pfL.style.width=pct;
    if(tnV) tnV.textContent=fmt(t);
    if(tnL) tnL.textContent=fmt(t);
  }
  function updateActive(t){
    setProgress(t);
    let newActive=-1;
    for(let i=0;i<LYRICS.length;i++){if(t>=LYRICS[i].t)newActive=i;}
    if(newActive===activeIdx) return;
    activeIdx=newActive;
    [lyricsV,lyricsL].forEach(cont=>{
      if(!cont) return;
      const blocks=cont.querySelectorAll('.lyric-block');
      blocks.forEach((b,i)=>{b.classList.toggle('active',i===activeIdx);b.classList.toggle('past',i<activeIdx);});
      if(activeIdx>=0&&blocks[activeIdx]){
        if(cont===lyricsL){cont.scrollTo({top:blocks[activeIdx].offsetTop-cont.clientHeight/2,behavior:'smooth'});}
        else{blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});}
      }
    });
    if(scrollBtn) scrollBtn.classList.toggle('active',activeIdx>=0);
  }
  audio.addEventListener('loadedmetadata',()=>{
    const d=fmt(audio.duration);
    if(ttV) ttV.textContent=d;
    if(ttL) ttL.textContent=d;
  });
  audio.addEventListener('timeupdate',()=>updateActive(audio.currentTime));
  audio.addEventListener('ended',()=>{
    document.body.classList.remove('is-playing');
    document.querySelectorAll('#vizV,#vizL,#visualizer').forEach(v=>v&&v.classList.remove('playing'));
    if(playV) playV.textContent='▶ Play';
    if(playL) playL.textContent='▶';
    if(scrollBtn) scrollBtn.classList.remove('active');
  });
  if(pbV) pbV.addEventListener('click',e=>{const r=pbV.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);});
  if(pbL) pbL.addEventListener('click',e=>{const r=pbL.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);});
  function togglePlay(){
    if(audio.paused){
      audio.play();
      if(playV) playV.textContent='⏸ Pausa';
      if(playL) playL.textContent='⏸';
      document.body.classList.add('is-playing');
      document.querySelectorAll('#vizV,#vizL,#visualizer').forEach(v=>v&&v.classList.add('playing'));
    } else {
      audio.pause();
      if(playV) playV.textContent='▶ Play';
      if(playL) playL.textContent='▶';
      document.body.classList.remove('is-playing');
      document.querySelectorAll('#vizV,#vizL,#visualizer').forEach(v=>v&&v.classList.remove('playing'));
    }
  }
  function doReset(){
    audio.pause();audio.currentTime=0;activeIdx=-1;
    if(playV) playV.textContent='▶ Play';
    if(playL) playL.textContent='▶';
    document.body.classList.remove('is-playing');
    document.querySelectorAll('#vizV,#vizL,#visualizer').forEach(v=>v&&v.classList.remove('playing'));
    [lyricsV,lyricsL].forEach(c=>c&&c.querySelectorAll('.lyric-block').forEach(b=>b.classList.remove('active','past')));
    if(scrollBtn) scrollBtn.classList.remove('active');
    window.scrollTo({top:0,behavior:'smooth'});
  }
  if(playV) playV.addEventListener('click',togglePlay);
  if(playL) playL.addEventListener('click',togglePlay);
  if(resetV) resetV.addEventListener('click',doReset);
  if(resetL) resetL.addEventListener('click',doReset);
  if(volV) volV.addEventListener('input',e=>{audio.volume=parseFloat(e.target.value);if(volL)volL.value=e.target.value;});
  if(volL) volL.addEventListener('input',e=>{audio.volume=parseFloat(e.target.value);if(volV)volV.value=e.target.value;});
  audio.volume=0.8;
  if(scrollBtn) scrollBtn.addEventListener('click',()=>{
    if(!lyricsV) return;
    const blocks=lyricsV.querySelectorAll('.lyric-block');
    if(activeIdx>=0&&blocks[activeIdx]) blocks[activeIdx].scrollIntoView({behavior:'smooth',block:'center'});
  });
  function setView(v){document.body.className=document.body.className.replace(/\bview-\S+/g,'').trim();if(v!=='all')document.body.classList.add('view-'+v);if(!audio.paused)document.body.classList.add('is-playing');}
  document.querySelectorAll('.toggle-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.land-toggle').forEach(b=>{b.classList.toggle('active',b.dataset.view===btn.dataset.view);});setView(btn.dataset.view);});});
  document.querySelectorAll('.land-toggle').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.land-toggle').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.toggle-btn').forEach(b=>{b.classList.toggle('active',b.dataset.view===btn.dataset.view);});setView(btn.dataset.view);});});
  // Build visualizers
  ['vizV','vizL','visualizer'].forEach(id=>{
    const vizEl=document.getElementById(id);
    if(!vizEl) return;
    const count=id==='visualizer'?48:24;
    for(let i=0;i<count;i++){const bar=document.createElement('div');bar.className='bar';const mh=8+Math.sin(i*0.4)*22+Math.random()*16;bar.style.cssText=`--max-h:${mh}px;--spd:${0.4+Math.random()*0.8}s;--delay:${(i/count)*-1.2}s;`;vizEl.appendChild(bar);}
  });
})();
</script>
<script>
// ═══ LANDSCAPE JS ═══
(function(){
  var audio = document.getElementById('audio');
  if(!audio) return;
  var pfL = document.getElementById('pfL');
  var tnL = document.getElementById('tnL');
  var ttL = document.getElementById('ttL');
  var pbL = document.getElementById('pbL');
  var playL = document.getElementById('playL');
  var resetL = document.getElementById('resetL');
  var volL = document.getElementById('volL');
  var vizL = document.getElementById('vizL');
  var lyricsL = document.getElementById('lyricsL');
  var activeIdxL = -1;
  var fmt = function(s){ return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); };

  // Build lyrics in landscape
  if(lyricsL && typeof LYRICS !== 'undefined'){
    var curSec = null;
    LYRICS.forEach(function(line, i){
      if(line.section !== curSec){
        curSec = line.section;
        var sl = document.createElement('div'); sl.className = 'section-label';
        sl.innerHTML = '<span>'+line.section+'</span>'; lyricsL.appendChild(sl);
      }
      var b = document.createElement('div'); b.className = 'lyric-block'; b.dataset.idx = i;
      var h = '';
      if(line.es) h += '<div class="lyric-es">'+line.es+'</div>';
      if(line.ro && line.ro !== '—') h += '<div class="lyric-romaji">'+line.ro+'</div>';
      if(line.kj && line.kj !== '—') h += '<div class="lyric-kanji">'+line.kj+'</div>';
      b.innerHTML = h;
      b.addEventListener('click', function(){ audio.currentTime = line.t; });
      lyricsL.appendChild(b);
    });
  }

  function syncBlocks(t){
    if(!lyricsL || typeof LYRICS === 'undefined') return;
    var newActive = -1;
    for(var i=0;i<LYRICS.length;i++){ if(t>=LYRICS[i].t) newActive=i; }
    if(newActive === activeIdxL) return;
    activeIdxL = newActive;
    var blocks = lyricsL.querySelectorAll('.lyric-block');
    blocks.forEach(function(b,i){
      b.classList.toggle('active', i===activeIdxL);
      b.classList.toggle('past', i<activeIdxL);
    });
    if(activeIdxL>=0 && blocks[activeIdxL]){
      lyricsL.scrollTo({top: blocks[activeIdxL].offsetTop - lyricsL.clientHeight/2, behavior:'smooth'});
    }
  }

  audio.addEventListener('timeupdate', function(){
    var t = audio.currentTime;
    if(pfL) pfL.style.width = (audio.duration?(t/audio.duration*100):0)+'%';
    if(tnL) tnL.textContent = fmt(t);
    syncBlocks(t);
  });
  audio.addEventListener('loadedmetadata', function(){ if(ttL) ttL.textContent = fmt(audio.duration); });
  audio.addEventListener('ended', function(){
    if(vizL) vizL.classList.remove('playing');
    if(playL) playL.textContent = '▶';
  });

  if(pbL) pbL.addEventListener('click', function(e){
    var r = pbL.getBoundingClientRect();
    audio.currentTime = ((e.clientX-r.left)/r.width)*(audio.duration||0);
  });

  function doTogglePlay(){
    var playV = document.getElementById('playBtn')||document.getElementById('playV');
    if(playV) { playV.click(); }
    else {
      if(audio.paused){ audio.play(); } else { audio.pause(); }
    }
    if(playL) playL.textContent = audio.paused ? '▶' : '⏸';
    if(vizL) vizL.classList.toggle('playing', !audio.paused);
  }
  if(playL) playL.addEventListener('click', doTogglePlay);

  if(resetL) resetL.addEventListener('click', function(){
    audio.pause(); audio.currentTime = 0; activeIdxL = -1;
    if(playL) playL.textContent = '▶';
    if(vizL) vizL.classList.remove('playing');
    if(lyricsL) lyricsL.querySelectorAll('.lyric-block').forEach(function(b){ b.classList.remove('active','past'); });
    var resetV = document.getElementById('resetBtn')||document.getElementById('resetV');
    if(resetV) resetV.click();
  });

  if(volL) volL.addEventListener('input', function(e){
    audio.volume = parseFloat(e.target.value);
    var vv = document.getElementById('vol')||document.getElementById('volV');
    if(vv) vv.value = e.target.value;
  });

  // Landscape view toggles
  document.querySelectorAll('.land-toggle').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.land-toggle').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var v = btn.dataset.view;
      document.body.className = document.body.className.replace(/\bview-\S+/g,'').trim();
      if(v!=='all') document.body.classList.add('view-'+v);
      document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.view===v); });
    });
  });

  // Build vizL bars
  if(vizL){ for(var i=0;i<24;i++){
    var bar=document.createElement('div'); bar.className='bar';
    var mh=8+Math.sin(i*0.4)*22+Math.random()*16;
    bar.style.cssText='--max-h:'+mh+'px;--spd:'+(0.4+Math.random()*0.8)+'s;--delay:'+((i/24)*-1.2)+'s;';
    vizL.appendChild(bar);
  }}
})();
</script>
