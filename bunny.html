<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunny Girl · Akasaki — Musci</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0800;--card:#1a1000;--accent1:#e8732a;--accent2:#f5b87a;--accent3:#8b3a00;--text:#fff5ee;--muted:#6b4a2a;--glow:rgba(232,115,42,0.35)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(140,60,0,0.18) 0%,transparent 70%);z-index:0;pointer-events:none}
  .back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(15,8,0,0.85);border:1px solid rgba(232,115,42,0.3);color:var(--accent1);padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px);transition:all 0.2s}
  .back-btn:hover{border-color:var(--accent1);background:rgba(232,115,42,0.1)}
  .container{position:relative;z-index:1;max-width:860px;width:100%;display:flex;flex-direction:column;align-items:center;gap:2rem}
  .title-block{text-align:center}
  .song-kanji{font-family:'Noto Serif JP',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.1em;margin-bottom:0.3rem}
  .song-romaji{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,3vw,1.4rem);color:var(--accent2);opacity:0.7;letter-spacing:0.2em;margin-bottom:0.4rem}
  .artist-line{color:var(--muted);font-size:0.85rem;letter-spacing:0.3em;text-transform:uppercase}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;width:100%}
  @media(max-width:560px){.panels{grid-template-columns:1fr}}
  .panel{border-radius:20px;overflow:hidden;border:1px solid rgba(232,115,42,0.2);background:var(--card);transition:all 0.3s;text-decoration:none;display:block;position:relative}
  .panel:hover{border-color:var(--accent1);box-shadow:0 0 30px rgba(232,115,42,0.2);transform:translateY(-4px)}
  .panel img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .panel-label{padding:1rem 1.2rem;display:flex;align-items:center;gap:0.6rem;color:var(--accent2);font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic}
  .panel-label .icon{font-size:1.1rem}
  .panel-video iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
  .panel-video .panel-label{color:var(--muted)}
  .palette{display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center}
  .swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:all 0.2s;position:relative;border:2px solid transparent}
  .swatch:hover{transform:scale(1.4);border-color:rgba(255,255,255,0.3)}
  .swatch:hover::after{content:attr(data-hex);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:var(--muted);white-space:nowrap;font-family:monospace}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="container">
  <div class="title-block">
    <div class="song-kanji">バニーガール</div>
    <div class="song-romaji">Bunny Girl</div>
    <div class="artist-line">Akasaki · 2024</div>
  </div>

  <div class="panels">
    <a class="panel" href="bunny-letras.html">
      <img src="Bunny.jpeg" alt="Bunny Girl cover">
      <div class="panel-label"><span class="icon">歌</span> 歌詞 Letras</div>
    </a>
    <div class="panel panel-video">
      <iframe src="https://drive.google.com/file/d/1wk3eY5HCYTq22O54MaOmoAvJvejt8QwH/preview" allowfullscreen allow="autoplay"></iframe>
      <div class="panel-label"><span class="icon">🎬</span> Video</div>
    </div>
  </div>

  <div class="palette">
    <div class="swatch" style="background:#0f0800" data-hex="#0f0800"></div>
    <div class="swatch" style="background:#3d1a00" data-hex="#3d1a00"></div>
    <div class="swatch" style="background:#8b3a00" data-hex="#8b3a00"></div>
    <div class="swatch" style="background:#e8732a" data-hex="#e8732a"></div>
    <div class="swatch" style="background:#f5b87a" data-hex="#f5b87a"></div>
    <div class="swatch" style="background:#fff5ee" data-hex="#fff5ee"></div>
    <div class="swatch" style="background:#c0392b" data-hex="#c0392b"></div>
    <div class="swatch" style="background:#ffffff" data-hex="#ffffff"></div>
  </div>
</div>
</body>
</html>
