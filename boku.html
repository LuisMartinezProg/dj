<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>僕らはそれを愛と呼んだ · あたらよ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1318;color:#f0e8d8;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 50% at 15% 30%,rgba(232,164,86,0.1) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 85% 70%,rgba(42,96,128,0.12) 0%,transparent 60%);
  z-index:0;pointer-events:none}
.back-btn{position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(13,19,24,0.9);border:1px solid rgba(232,164,86,0.2);color:#e8a456;padding:0.5rem 1rem;border-radius:999px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(8px)}
.card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:380px;width:100%}
.cover-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(232,164,86,0.1)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(13,19,24,0.55) 100%)}
.info{text-align:center}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,5vw,2rem);font-weight:300;background:linear-gradient(135deg,#e8a456,#f5c87a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;margin-bottom:0.25rem;line-height:1.3}
.song-title-sub{font-family:'Cormorant Garamond',serif;font-size:0.85rem;color:#e8a456;opacity:0.55;font-style:italic;margin-bottom:0.4rem;letter-spacing:0.05em}
.artist-name{font-size:0.78rem;letter-spacing:0.4em;text-transform:uppercase;color:#3a5060;margin-bottom:0.2rem}
.year{font-size:0.72rem;letter-spacing:0.2em;color:#2a3a44}
.btn-lyrics{display:inline-flex;align-items:center;gap:0.6rem;margin-top:1.8rem;padding:0.85rem 2.4rem;border:1px solid rgba(232,164,86,0.35);border-radius:999px;color:#e8a456;text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:0.12em;transition:all 0.3s;background:transparent}
.btn-lyrics:hover{background:rgba(232,164,86,0.08);border-color:rgba(232,164,86,0.7);color:#f5c87a;box-shadow:0 0 20px rgba(232,164,86,0.15)}
.sun-dot{width:7px;height:7px;border-radius:50%;background:#e8a456;box-shadow:0 0 8px rgba(232,164,86,0.7)}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Inicio</a>
<div class="card">
  <div class="cover-wrap">
    <img src="Boku imagen.png" alt="僕らはそれを愛と呼んだ">
    <div class="cover-overlay"></div>
  </div>
  <div class="info">
    <div class="song-title">僕らはそれを愛と呼んだ</div>
    <div class="song-title-sub">bokura wa sore wo ai to yonda</div>
    <div class="artist-name">あたらよ · Atarayo</div>
    <a class="btn-lyrics" href="boku-letras.html">
      <span class="sun-dot"></span>
      Ver letra sincronizada
    </a>
  </div>
</div>
</body>
</html>
